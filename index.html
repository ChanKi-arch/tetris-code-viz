      // ---------- Domain logic (스9 그대로) ----------

      const riskTone = {

      function buildDiffLines(before, after) {
        const beforeLines = before.split("\n");
        const afterLines = after.split("\n");
        const maxLen = Math.max(beforeLines.length, afterLines.length);
        const lines = [];
        for (let i = 0; i < maxLen; i++) {
          const left = beforeLines[i];
          const right = afterLines[i];
          if (left === right) {
            if (left !== undefined) lines.push({ type: "context", content: `  ${left}` });
            continue;
          }
          if (left !== undefined) lines.push({ type: "remove", content: `- ${left}` });
          if (right !== undefined) lines.push({ type: "add", content: `+ ${right}` });
        }
        return lines;
      }

      function analyzeInput(prompt, filesText, code) {
        const lp = prompt.toLowerCase();
        const lc = code.toLowerCase();
        const fileCount = filesText.split(",").map(f => f.trim()).filter(Boolean).length;
        const lineCount = code.split("\n").filter(Boolean).length;
        const keywords = ["login", "auth", "session", "route", "service", "password"].filter(k => lp.includes(k) || lc.includes(k));
        return {
          hasAsync: /async|await/.test(lc),
          hasSessionCheck: /session/.test(lc),
          hasErrorThrow: /throw new error/.test(lc),
          hasResponseJson: /response\.json/.test(lc),
          lineCount, fileCount, keywords,
        };
      }

      function inferStrategies(prompt, filesText, code) {
        const files = filesText.split(",").map(f => f.trim()).filter(Boolean);
        const wantsMinimal = /minimal|keep|existing|intact/i.test(prompt);
        const wantsPerformance = /fast|performance|optimi/i.test(prompt);
        const wantsRefactor = /refactor|clean|architecture|maintain/i.test(prompt);
        const auth = /auth|login|session|token|firebase|oauth/i.test(prompt);
        const signals = analyzeInput(prompt, filesText, code);
        const parserResult = parseCodeToStructure(code.trim() || initialCode);
        const baseFiles = files.length ? files : ["app/page.tsx", "lib/api.ts"];
        const sharedBefore = code.trim() || initialCode;
        const baseConfidence = signals.hasSessionCheck ? 6 : -4;
        const baseImpact = signals.fileCount > 2 ? 6 : 0;

        const strategyAAfter = `export async function login(email: string, password: string) {
  const session = await getSession();
  if (!session) {
    throw new Error("No session");
  }

  const result = await signInWithEmail(email, password);
  if (!result.ok) {
    return { ok: false, error: "Invalid credentials" };
  }

  return { ok: true, user: result.user };
}`;

        const strategyBAfter = `export async function login(email: string, password: string) {
  return authService.loginWithPassword({ email, password });
}

export const authService = {
  async loginWithPassword(input: { email: string; password: string }) {
    const session = await getSession();
    if (!session) {
      throw new Error("No session");
    }

    return signInWithEmail(input.email, input.password);
  },
};`;

        const strategyCAfter = `export async function POST(req: Request) {
  const { email, password } = await req.json();
  const session = await getSession();

  if (!session) {
    return Response.json({ ok: false, error: "No session" }, { status: 401 });
  }

  const result = await signInWithEmail(email, password);

  if (!result.ok) {
    return Response.json({ ok: false, error: "Invalid credentials" }, { status: 400 });
  }

  return Response.json({ ok: true, user: result.user });
}`;

        { key: "V4", name: "System",      side: "structural", hint: "module / package" },
        { key: "V5", name: "Form",        side: "contextual", hint: "sync / async / stream" },
        { key: "V6", name: "Medium",      side: "contextual", hint: "DB / API / file" },
        { key: "V7", name: "Experience",  side: "contextual", hint: "UX flow / error" },
        { key: "V8", name: "Purpose",     side: "contextual", hint: "business intent" },
      ];

      function decomposeSlots(strategy, signals) {
        const primary = strategy.files[0] || "—";
        const edge = strategy.dependencyEdges[0];
        const nodeCount = strategy.dependencyNodes.length;
        const medium = signals.hasSessionCheck && signals.hasResponseJson ? "session + HTTP JSON"
                     : signals.hasResponseJson ? "HTTP JSON"
                     : signals.hasSessionCheck ? "session / cookie"
                     : "in-memory";
        const expVal = strategy.verdict === "go" ? "smooth path"
                     : strategy.verdict === "caution" ? "needs review gate"
                     : "high review demand";
        return {
          V1: primary,
          V2: edge ? `${edge.from} → ${edge.to}` : "(no edges)",
          V3: signals.hasAsync ? `async ${signals.hasErrorThrow ? "+ throw" : ""}`.trim() : "sync call",
          V4: `${nodeCount} nodes / ${strategy.files.length} files`,
          V5: signals.hasAsync ? "async / await" : "sync",
          V6: medium,
          V7: expVal,
          V8: strategy.name,
        };
      }

      // ---------- BYOK LLM (V5~V8 inference, contextual slots) ----------
      const DEFAULT_LLM_CFG = {
        enabled: false,
        baseUrl: "http://localhost:1234/v1",
        apiKey: "",
        model: "qwen2.5-7b-instruct",
      };
      function loadLlmCfg() {
        try {
          const raw = localStorage.getItem("tf_llm");
          if (!raw) return { ...DEFAULT_LLM_CFG };
          return { ...DEFAULT_LLM_CFG, ...JSON.parse(raw) };
        } catch (e) { return { ...DEFAULT_LLM_CFG }; }
      }
      function saveLlmCfg(cfg) {
        try { localStorage.setItem("tf_llm", JSON.stringify(cfg)); } catch (e) {}
      }

      async function llmImagineContextual(cfg, prompt, code) {
        const res = await fetch(`${cfg.baseUrl.replace(/\/+$/,"")}/chat/completions`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            ...(cfg.apiKey ? { Authorization: `Bearer ${cfg.apiKey}` } : {}),
          },
          body: JSON.stringify({
            model: cfg.model,
            temperature: 0.3,
            messages: [
              { role: "system", content: "You are an imagination engine, not a parser. Read the prompt+code and IMAGINE the 4 contextual slots (V5~V8). Return ONLY ONE flat JSON with exactly these 4 keys: form, medium, experience, purpose. Each value ≤10 words. No prose, no markdown fences." },
              { role: "user", content: `Prompt: ${prompt}\n\nCode:\n${code}` },
            ],
          }),
        });
        if (!res.ok) throw new Error(`LLM ${res.status}`);
        const data = await res.json();
        const content = data?.choices?.[0]?.message?.content || "";
        const m = content.match(/\{[\s\S]*\}/);
        if (!m) throw new Error("no JSON in LLM output");
        const obj = JSON.parse(m[0]);
        return { V5: obj.form, V6: obj.medium, V7: obj.experience, V8: obj.purpose };
      }

      // ---------- Export / Permalink ----------
      function downloadJson(payload, filename) {
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename || `traceforge-${Date.now()}.json`;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function encodeState(state) {
        try { return btoa(unescape(encodeURIComponent(JSON.stringify(state)))); }
        catch (e) { return ""; }
      }
      function decodeState(encoded) {
        try { return JSON.parse(decodeURIComponent(escape(atob(encoded)))); }
        catch (e) { return null; }
      }
      function readInitialPermalink() {
        if (typeof location === "undefined") return null;
        const h = location.hash || "";
        if (!h.startsWith("#s=")) return null;
        return decodeState(h.slice(3));
      }

      // ---------- Decompose (코드 → 슬롯 역매핑) ----------
      function tagLine(line) {
        const l = line.toLowerCase();
        const tags = [];
        if (/export\s+(async\s+)?function|export\s+const/.test(line)) tags.push("V1");
        if (/^\s*import\s|require\(/.test(line)) tags.push("V2");
        if (/session|getsession/.test(l)) tags.push("V6");
        if (/async|await|response\.json/.test(l)) tags.push("V5");
        if (/throw\s+new|catch\s*\(|\.error|error:/.test(l)) tags.push("V7");
        if (/return\s+/.test(l)) tags.push("V8");
        if (/response\.json|fetch\s*\(|axios\.|await\s+\w+\(/.test(l)) tags.push("V3");
        if (/^\s*\/\//.test(line) || /authservice|services\//.test(l)) tags.push("V4");
        // fallback
        if (!tags.length && line.trim()) tags.push("V1");
        return [...new Set(tags)];
      }

      function decomposeCode(codeAfter) {
        return codeAfter.split("\n").map((line, idx) => ({ idx, line, tags: tagLine(line) }));
      }

      const SLOT_COLOR = {
        V1: "bg-sky-100 text-sky-700 border-sky-200",
        V2: "bg-sky-100 text-sky-700 border-sky-200",
        V3: "bg-sky-100 text-sky-700 border-sky-200",
        V4: "bg-sky-100 text-sky-700 border-sky-200",
        V5: "bg-violet-100 text-violet-700 border-violet-200",
        V6: "bg-violet-100 text-violet-700 border-violet-200",
        V7: "bg-violet-100 text-violet-700 border-violet-200",
        V8: "bg-violet-100 text-violet-700 border-violet-200",
      };

      function DecomposePanel({ codeAfter, activeSlot, onSlotHover }) {
        const tagged = useMemo(() => decomposeCode(codeAfter), [codeAfter]);
        return (
          <div className="space-y-2">
            <div className="flex flex-wrap items-center gap-2 text-xs text-slate-500">
              <span>slot filter:</span>
              {["V1","V2","V3","V4","V5","V6","V7","V8"].map(k => (
                <button key={k}
                  onClick={() => onSlotHover(activeSlot === k ? null : k)}
                  className={cn("rounded-full border px-2 py-0.5 font-mono text-xs",
                    activeSlot === k ? "border-slate-900 bg-slate-900 text-white" : SLOT_COLOR[k])}>
                  {k}
                </button>
              ))}
              {activeSlot && <button onClick={() => onSlotHover(null)} className="ml-2 text-slate-400 underline">clear</button>}
            </div>
            <pre className="overflow-x-auto rounded-2xl bg-slate-950 p-4 text-xs leading-6 text-slate-100">
              {tagged.map(({ idx, line, tags }) => {
                const dim = activeSlot && !tags.includes(activeSlot);
                return (
                  <div key={idx} className={cn("flex gap-3 px-2", dim && "opacity-25")}>
                    <span className="w-6 flex-shrink-0 text-right text-slate-600">{idx + 1}</span>
                    <span className="flex-1 font-mono whitespace-pre">{line || " "}</span>
                    <span className="flex flex-shrink-0 gap-1">
                      {tags.map(t => (
                        <span key={t} className={cn("inline-block rounded px-1.5 text-[10px] font-mono",
                          t === activeSlot ? "bg-emerald-400 text-emerald-950"
                          : "V1 V2 V3 V4".includes(t) ? "bg-sky-400/30 text-sky-200"
                          : "bg-violet-400/30 text-violet-200")}>
                          {t}
                        </span>
                      ))}
                    </span>
                  </div>
                );
              })}
            </pre>
            <div className="text-[11px] text-slate-500">
              Right-side badges show which slot each line maps to. Click slot filter to highlight a specific slot.
            </div>
          </div>
        );
      }

      // ---------- Cartridge (선언적 핫스왑) ----------
      const CARTRIDGES = [
        {
          id: "default",
          name: "Default",
          description: "no bias — base heuristics",
          weights: { confidence: 0, impact: 0, complexity: 0 },
          verdictBias: null,
        },
        {
          id: "fast-proto",
          name: "Fast Prototype",
          description: "move fast, accept small risk",
          weights: { confidence: -4, impact: -10, complexity: -8 },
          verdictBias: "go",
        },
        {
          id: "refactor-first",
          name: "Refactor First",
          description: "prefer cleaner boundaries",
          weights: { confidence: +4, impact: +6, complexity: +4 },
          verdictBias: "caution",
        },
        {
          id: "conservative",
          name: "Conservative",
          description: "preserve existing flow, cautious",
          weights: { confidence: -2, impact: -4, complexity: -2 },
          verdictBias: "caution",
        },
      ];
      const clamp = (n) => Math.max(0, Math.min(100, Math.round(n)));

      function applyCartridge(strategies, cartridge) {
        if (!cartridge || cartridge.id === "default") return strategies;
        return strategies.map((s) => ({
          ...s,
          confidence: clamp(s.confidence + cartridge.weights.confidence),
          impact: clamp(s.impact + cartridge.weights.impact),
          complexity: clamp(s.complexity + cartridge.weights.complexity),
          verdict: cartridge.verdictBias === "go" && s.verdict === "review" ? "caution"
                 : cartridge.verdictBias === "go" && s.verdict === "caution" ? "go"
                 : cartridge.verdictBias === "caution" && s.verdict === "go" ? "caution"
                 : s.verdict,
        }));
      }

      // ---------- Slot-wise merge ----------
      function mergeSlots(a, b, signals) {
        const slotsA = decomposeSlots(a, signals);
        const slotsB = decomposeSlots(b, signals);
        const merged = {};
        SLOTS.forEach(s => {
          merged[s.key] = `${slotsA[s.key]} ⊕ ${slotsB[s.key]}`;
        });
        return {
          id: `M(${a.id}+${b.id})`,
          label: `Merge(${a.id}+${b.id})`,
          title: `${a.name} ⊕ ${b.name}`,
          confidence: Math.round((a.confidence + b.confidence) / 2),
          impact: Math.round((a.impact + b.impact) / 2),
          complexity: Math.round((a.complexity + b.complexity) / 2 + 5),
          risk: a.risk === "high" || b.risk === "high" ? "high" : (a.risk === "medium" || b.risk === "medium") ? "medium" : "low",
          verdict: a.verdict === "review" || b.verdict === "review" ? "review"
                 : a.verdict === "caution" || b.verdict === "caution" ? "caution" : "go",
          slots: merged,
          sources: [a.id, b.id],
        };
      }

      function SlotGrid({ slots }) {
        return (
          <div className="grid gap-3 md:grid-cols-4">
            {SLOTS.map((s) => {
              const isD = s.side === "structural";
              return (
                <div key={s.key}
                  className={cn("rounded-2xl border p-3",
                    isD ? "bg-sky-50 border-sky-200" : "bg-violet-50 border-violet-200")}>
                  <div className="flex items-center justify-between">
                    <div className={cn("font-mono text-xs font-bold",
                      isD ? "text-sky-700" : "text-violet-700")}>{s.key}</div>
                    <span className={cn("text-[10px] rounded-full border px-1.5",
                      isD ? "border-sky-300 text-sky-700" : "border-violet-300 text-violet-700")}>{s.side}</span>
                  </div>
                  <div className="mt-1 text-sm font-semibold text-slate-900">{s.name}</div>
                  <div className="text-[11px] text-slate-500">{s.hint}</div>
                  <div className="mt-2 rounded-md bg-white px-2 py-1.5 text-xs font-mono text-slate-800 break-all">
                    {slots[s.key]}
                  </div>
                </div>
              );
            })}
          </div>
        );
      }

      function MetricBar({ label, value }) {
        return (
          <div className="space-y-2">
            <div className="flex items-center justify-between text-sm">
              <span className="text-slate-600">{label}</span>
              <span className="font-medium text-slate-900">{value}%</span>
            </div>
            <Progress value={value} />
          </div>
        );
      }

      const toneClass = (tone) => tone === "stable" ? "bg-emerald-50 border-emerald-200 text-emerald-800"
        : tone === "watch" ? "bg-amber-50 border-amber-200 text-amber-800"
        : "bg-rose-50 border-rose-200 text-rose-800";
      const verdictClass = (v) => v === "go" ? "bg-emerald-100 text-emerald-700 border-emerald-200"
        : v === "caution" ? "bg-amber-100 text-amber-700 border-amber-200"
        : "bg-rose-100 text-rose-700 border-rose-200";
      const impactBadgeClass = (l) => l === "high" ? "bg-rose-100 text-rose-700 border-rose-200"
        : l === "medium" ? "bg-amber-100 text-amber-700 border-amber-200"
        : "bg-emerald-100 text-emerald-700 border-emerald-200";
      const diffLineClass = (t) => t === "add" ? "bg-emerald-950/70 text-emerald-200"
        : t === "remove" ? "bg-rose-950/70 text-rose-200" : "text-slate-300";
      const nodeKindClass = (k) => k === "entry" ? "bg-sky-100 text-sky-700 border-sky-200"
        : k === "module" ? "bg-violet-100 text-violet-700 border-violet-200"
        : k === "ui" ? "bg-amber-100 text-amber-700 border-amber-200"
        : "bg-emerald-100 text-emerald-700 border-emerald-200";

      // ==========================================================
      // Adapter Schema — Cursor / Codex / Claude Code / Generic
      // 흐름: AI tool raw session → Adapter.normalize → NormalizedTraceSession
      //       → buildStudioImportState → studio state 주입
      // ==========================================================

      // -------- Common Trace Schema (값만; TS 타입은 babel preset-typescript가 제거) --------
      const CursorAdapter = {
        sourceTool: "cursor",
        normalize(input) {
          const filesMap = new Map();
          input.edits.forEach((edit) => {
            const current = filesMap.get(edit.path) ?? { path: edit.path };
            filesMap.set(edit.path, {
              ...current,
              before: edit.before ?? current.before,
              after: edit.after ?? current.after,
            });
          });
          const events = [
            { type: "session_started", timestamp: input.startedAt,
              meta: { sessionId: input.sessionId, sourceTool: "cursor",
                startedAt: input.startedAt, repoName: input.repoName,
                branch: input.branch, userPrompt: input.prompt } },
            { type: "prompt_received", timestamp: input.startedAt,
              prompt: input.prompt, referencedFiles: input.referencedFiles },
          ];
          if (input.referencedFiles?.length) {
            events.push(...input.referencedFiles.map((path, i) =>
              ({ type: "file_selected", timestamp: input.startedAt + i, path })));
          }
          input.edits.forEach((edit) => {
            events.push({ type: "code_generated", timestamp: edit.timestamp,
              path: edit.path, diff: edit.diff, before: edit.before, after: edit.after,
              summary: "Cursor edit generated" });
            if (edit.diff) events.push({ type: "patch_applied",
              timestamp: edit.timestamp + 1, path: edit.path, diff: edit.diff });
          });
          events.push({ type: "final_selected",
            timestamp: Math.max(input.startedAt, ...input.edits.map(e => e.timestamp), input.startedAt + 1),
            changedFiles: [...filesMap.keys()], summary: input.summary });
          return {
            meta: { sessionId: input.sessionId, sourceTool: "cursor",
              startedAt: input.startedAt, repoName: input.repoName,
              branch: input.branch, userPrompt: input.prompt },
            files: [...filesMap.values()], events,
          };
        },
      };

      const CodexAdapter = {
        sourceTool: "codex",
        normalize(input) {
          const filesMap = new Map();
          input.patches.forEach((p) => {
            const current = filesMap.get(p.path) ?? { path: p.path };
            filesMap.set(p.path, { ...current, before: p.before ?? current.before, after: p.after ?? current.after });
          });
          const events = [
            { type: "session_started", timestamp: input.startedAt,
              meta: { sessionId: input.sessionId, sourceTool: "codex",
                startedAt: input.startedAt, repoName: input.repoName,
                branch: input.branch, userPrompt: input.instruction } },
            { type: "prompt_received", timestamp: input.startedAt, prompt: input.instruction },
          ];
          input.commands?.forEach(cmd => events.push({ type: "command_executed",
            timestamp: cmd.timestamp, command: cmd.command, exitCode: cmd.exitCode, summary: cmd.summary }));
          input.patches.forEach((p) => {
            events.push({ type: "code_generated", timestamp: p.timestamp,
              path: p.path, diff: p.diff, before: p.before, after: p.after, summary: "Codex patch generated" });
            if (p.accepted === false) events.push({ type: "patch_rejected",
              timestamp: p.timestamp + 1, path: p.path, diff: p.diff,
              reason: p.rejectReason ?? "Rejected patch" });
            else events.push({ type: "patch_applied", timestamp: p.timestamp + 1, path: p.path, diff: p.diff });
          });
          events.push({ type: "final_selected",
            timestamp: Math.max(input.startedAt, ...input.patches.map(p => p.timestamp), input.startedAt + 1),
            changedFiles: [...filesMap.keys()], summary: input.summary });
          return {
            meta: { sessionId: input.sessionId, sourceTool: "codex",
              startedAt: input.startedAt, repoName: input.repoName,
              branch: input.branch, userPrompt: input.instruction },
            files: [...filesMap.values()], events,
          };
        },
      };

      const ClaudeCodeAdapter = {
        sourceTool: "claude_code",
        normalize(input) {
          const filesMap = new Map();
          input.edits.forEach((e) => {
            const cur = filesMap.get(e.path) ?? { path: e.path };
            filesMap.set(e.path, { ...cur, before: e.before ?? cur.before, after: e.after ?? cur.after });
          });
          const events = [
            { type: "session_started", timestamp: input.startedAt,
              meta: { sessionId: input.sessionId, sourceTool: "claude_code",
                startedAt: input.startedAt, repoName: input.repoName,
                branch: input.branch, userPrompt: input.ask } },
            { type: "prompt_received", timestamp: input.startedAt, prompt: input.ask },
          ];
          if (input.plan?.length) {
            events.push({ type: "strategy_inferred", timestamp: input.plan[0].timestamp,
              candidates: input.plan.map(s => ({ id: s.id, name: s.text, selected: s.selected })) });
            const sel = input.plan.find(s => s.selected);
            if (sel) events.push({ type: "strategy_selected", timestamp: sel.timestamp,
              strategyId: sel.id, reason: sel.text });
          }
          input.toolCalls?.forEach(tc => events.push({ type: "tool_called",
            timestamp: tc.timestamp, toolName: tc.toolName,
            inputSummary: tc.inputSummary, outputSummary: tc.outputSummary }));
          input.edits.forEach((e) => {
            events.push({ type: "code_generated", timestamp: e.timestamp,
              path: e.path, diff: e.diff, before: e.before, after: e.after,
              summary: "Claude Code edit generated" });
            if (e.diff) events.push({ type: "patch_applied",
              timestamp: e.timestamp + 1, path: e.path, diff: e.diff });
          });
          events.push({ type: "final_selected",
            timestamp: Math.max(input.startedAt, ...input.edits.map(e => e.timestamp), input.startedAt + 1),
            changedFiles: [...filesMap.keys()], summary: input.summary });
          return {
            meta: { sessionId: input.sessionId, sourceTool: "claude_code",
              startedAt: input.startedAt, repoName: input.repoName,
              branch: input.branch, userPrompt: input.ask },
            files: [...filesMap.values()], events,
          };
        },
      };

      const GenericTraceAdapter = {
        sourceTool: "generic",
        normalize(input) {
          return {
            meta: { sessionId: input.sessionId, sourceTool: input.sourceTool ?? "generic",
              startedAt: input.startedAt, userPrompt: input.prompt },
            files: input.files ?? [], events: input.events,
          };
        },
      };

      // -------- Git Diff Adapter (패치2 기반) --------
      // 진짜 연결 루트: `git diff` 출력 텍스트 → NormalizedTraceSession
      // Cursor/Claude Code/Codex 모두 결국 파일 바꾸고 git diff 남김

      function inferLanguage(path) {
        if (/\.(ts|tsx)$/.test(path)) return "typescript";
        if (/\.(js|jsx)$/.test(path)) return "javascript";
        if (/\.py$/.test(path)) return "python";
        if (/\.go$/.test(path)) return "go";
        if (/\.rs$/.test(path)) return "rust";
        if (/\.(c|cpp|h|hpp)$/.test(path)) return "c";
        if (/\.(md|mdx)$/.test(path)) return "markdown";
        if (/\.(json|yaml|yml|toml)$/.test(path)) return "config";
        return undefined;
      }

      function inferStatusFromHeader(chunk) {
        if (/new file mode/.test(chunk)) return "added";
        if (/deleted file mode/.test(chunk)) return "deleted";
        if (/rename from/.test(chunk)) return "renamed";
        return "modified";
      }

      function parseUnifiedGitDiff(diffText) {
        const chunks = diffText.split(/^diff --git /m).map(c => c.trim()).filter(Boolean);
        return chunks.map(chunk => {
          const fullChunk = chunk.startsWith("a/") ? `diff --git ${chunk}` : chunk;
          const lines = fullChunk.split("\n");
          const header = lines[0] || "";
          const pathMatch = header.match(/ b\/(.+)$/);
          const path = (pathMatch && pathMatch[1].trim()) || "unknown";
          return { path, status: inferStatusFromHeader(fullChunk), patch: fullChunk };
        });
      }

      function countPatchLines(patch) {
        let added = 0, removed = 0;
        patch.split("\n").forEach(line => {
          if (line.startsWith("+++") || line.startsWith("---")) return;
          if (line.startsWith("+")) added += 1;
          if (line.startsWith("-")) removed += 1;
        });
        return { addedLines: added, removedLines: removed };
      }

      function extractBeforeAfterFromPatch(patch) {
        // @@ 헤더 이후 컨텍스트 + 추가/제거로 before/after 재구성
        const lines = patch.split("\n");
        const before = [];
        const after = [];
        let inHunk = false;
        for (const line of lines) {
          if (line.startsWith("@@")) { inHunk = true; continue; }
          if (!inHunk) continue;
          if (line.startsWith("+++") || line.startsWith("---")) continue;
          if (line.startsWith("+")) { after.push(line.slice(1)); continue; }
          if (line.startsWith("-")) { before.push(line.slice(1)); continue; }
          // 컨텍스트 (공백 시작 또는 일반)
          if (line.startsWith(" ") || line === "") {
            const content = line.startsWith(" ") ? line.slice(1) : line;
            before.push(content);
            after.push(content);
          }
        }
        return { before: before.join("\n"), after: after.join("\n") };
      }

      function inferStrategiesFromDiff(files) {
        const touchesRoute = files.some(f => /route\.|api\//.test(f.path));
        const touchesService = files.some(f => /service/i.test(f.path));
        const manyFiles = files.length >= 3;
        const candidates = [
          {
            id: "extend-existing-flow",
            name: "Extend Existing Flow",
            reason: "Default imported path based on direct file modifications.",
            confidence: manyFiles ? 74 : 84,
            selected: !touchesService && !touchesRoute,
          },
          {
            id: "service-layer-split",
            name: "Service Layer Split",
            reason: "Detected service-oriented file changes.",
            confidence: touchesService ? 82 : 66,
            selected: touchesService,
          },
          {
            id: "performance-oriented-route",
            name: "Performance-Oriented Route",
            reason: "Detected route or API-oriented changes.",
            confidence: touchesRoute ? 80 : 64,
            selected: touchesRoute,
          },
        ];
        if (!candidates.some(c => c.selected)) candidates[0].selected = true;
        return candidates;
      }

      function buildGitDiffTraceSession(input) {
        const startedAt = input.startedAt ?? Date.now();
        const parsedFiles = parseUnifiedGitDiff(input.diffText);
        const files = parsedFiles.map(file => {
          const provided = (input.files || []).find(f => f.path === file.path);
          if (provided && (provided.before || provided.after)) {
            return {
              path: file.path,
              language: provided.language ?? inferLanguage(file.path),
              before: provided.before,
              after: provided.after,
            };
          }
          // diff에서 추출
          const extracted = extractBeforeAfterFromPatch(file.patch);
          return {
            path: file.path,
            language: inferLanguage(file.path),
            before: extracted.before,
            after: extracted.after,
          };
        });
        const candidates = inferStrategiesFromDiff(parsedFiles);
        const selectedId = candidates.find(c => c.selected)?.id ?? candidates[0]?.id ?? "extend-existing-flow";
        const sessionId = input.sessionId ?? `git-${startedAt}`;
        const meta = {
          sessionId, sourceTool: "git", startedAt,
          endedAt: input.endedAt, repoName: input.repoName,
          branch: input.branch, userPrompt: input.prompt, title: input.title,
        };
        const events = [
          { type: "session_started", timestamp: startedAt, meta },
        ];
        if (input.prompt) {
          events.push({
            type: "prompt_received",
            timestamp: startedAt + 1,
            prompt: input.prompt,
            referencedFiles: files.map(f => f.path),
          });
        }
        events.push({ type: "context_loaded", timestamp: startedAt + 2, files });
        events.push({ type: "strategy_inferred", timestamp: startedAt + 3, candidates });
        events.push({
          type: "strategy_selected",
          timestamp: startedAt + 4,
          strategyId: selectedId,
          reason: candidates.find(c => c.id === selectedId)?.reason,
        });
        parsedFiles.forEach((file, i) => {
          const fileRef = files.find(ref => ref.path === file.path);
          const t = startedAt + 10 + i * 3;
          const counts = countPatchLines(file.patch);
          events.push({ type: "file_selected", timestamp: t, path: file.path });
          events.push({
            type: "code_generated", timestamp: t + 1, path: file.path,
            diff: file.patch, before: fileRef?.before, after: fileRef?.after,
            summary: `${file.status} file imported from git diff`,
          });
          events.push({
            type: "patch_applied", timestamp: t + 2, path: file.path,
            diff: file.patch, addedLines: counts.addedLines, removedLines: counts.removedLines,
          });
        });
        events.push({
          type: "final_selected", timestamp: startedAt + 100,
          strategyId: selectedId,
          changedFiles: files.map(f => f.path),
          summary: input.staged ? "Imported staged git diff." : "Imported working tree git diff.",
        });
        events.push({
          type: "session_finished", timestamp: startedAt + 101,
          status: "completed", summary: "Git diff imported into TraceForge session.",
        });
        return { meta, files, events };
      }

      const GitAdapter = {
        sourceTool: "git",
        normalize(input) {
          // input = { diffText, prompt?, repoName?, branch?, files? }
          return buildGitDiffTraceSession(input);
        },
      };

      const ADAPTERS = {
        cursor: CursorAdapter,
        codex: CodexAdapter,
        claude_code: ClaudeCodeAdapter,
        generic: GenericTraceAdapter,
        git: GitAdapter,
      };

      // -------- Session → Studio Import State (변환기) --------
      function deriveRisk(session) {
        const hasReject = session.events.some(e => e.type === "patch_rejected");
        const hasFail = session.events.some(e => e.type === "verification_result" && e.status === "fail");
        const hasWarn = session.events.some(e => e.type === "verification_result" && e.status === "warn");
        if (hasReject || hasFail) return "high";
        if (hasWarn) return "medium";
        return "low";
      }

      function deriveVerdict(session) {
        const finished = session.events.find(e => e.type === "session_finished");
        const hasReject = session.events.some(e => e.type === "patch_rejected");
        const hasFail = session.events.some(e => e.type === "verification_result" && e.status === "fail");
        if (finished?.status === "failed" || hasFail) return "review";
        if (hasReject) return "caution";
        return "go";
      }

      function summarizeTraceFromSession(session, selectedName) {
        const changed = new Set();
        let patches = 0, rejects = 0, tools = 0;
        session.events.forEach(e => {
          if ("path" in e && e.path) changed.add(e.path);
          if (e.type === "patch_applied") patches += 1;
          if (e.type === "patch_rejected") rejects += 1;
          if (e.type === "tool_called") tools += 1;
        });
        return [
          { stage: "Context merge",
            detail: `Imported ${changed.size || session.files.length} touched files from ${session.meta.sourceTool}.`,
            tone: "stable" },
          { stage: "Strategy selection",
            detail: `Mapped external session into ${selectedName}.`,
            tone: rejects > 0 ? "watch" : "stable" },
          { stage: "Execution trace",
            detail: `${patches} patches applied, ${rejects} rejected, ${tools} tool calls.`,
            tone: rejects > 0 ? "critical" : "stable" },
        ];
      }

      function buildImpactMapFromFiles(files) {
        return files.slice(0, 4).map(f => ({
          file: f.path,
          level: f.after && f.before && f.after !== f.before ? "high"
            : f.after ? "medium" : "low",
          note: f.after && f.before ? "File changed during the imported coding session."
            : "Referenced by the imported session.",
        }));
      }

      function buildDependencyGraphFromFiles(files) {
        const nodes = files.slice(0, 4).map((f, i) => ({
          id: f.path,
          kind: i === 0 ? "entry"
            : f.path.includes("route") ? "route"
            : f.path.includes("component") ? "ui" : "module",
          strength: i === 0 ? "high" : "medium",
        }));
        const edges = [];
        for (let i = 0; i < nodes.length - 1; i += 1) {
          edges.push({ from: nodes[i].id, to: nodes[i + 1].id, label: "imported session dependency" });
        }
        return { nodes, edges };
      }

      function deriveStrategyCandidates(session) {
        const inferred = session.events.find(e => e.type === "strategy_inferred");
        if (inferred) return inferred.candidates;
        return [{
          id: "imported-session",
          name: `${session.meta.sourceTool} imported session`,
          reason: "No explicit candidates were provided; imported session is the default path.",
          confidence: 76, selected: true,
        }];
      }

      function selectStrategyIdFromSession(session, candidates) {
        const sel = session.events.find(e => e.type === "strategy_selected");
        if (sel) return sel.strategyId;
        return candidates.find(c => c.selected)?.id ?? candidates[0]?.id ?? "imported-session";
      }

      function collectFilesFromSession(session) {
        if (session.files.length) return session.files;
        const files = new Map();
        session.events.forEach(e => {
          if ((e.type === "code_generated" || e.type === "patch_applied") && e.path) {
            const cur = files.get(e.path) ?? { path: e.path };
            files.set(e.path, {
              ...cur,
              before: "before" in e ? e.before ?? cur.before : cur.before,
              after: "after" in e ? e.after ?? cur.after : cur.after,
            });
          }
        });
        return [...files.values()];
      }

      function choosePrimaryCode(files) {
        const primary = files.find(f => f.after || f.before) ?? files[0] ?? { path: "imported.ts" };
        return {
          before: primary.before ?? "",
          after: primary.after ?? primary.before ?? "",
          file: primary.path,
        };
      }

      function patchTextToBlocks(strategyId, before, after, file) {
        const source = (after || before).split("\n")
          .map((line, idx) => {
            const role = detectRoleFromLine(line);
            if (role === null) return null;
            const leading = (line.match(/^[\s\t]*/) || [""])[0];
            const spaces = leading.replace(/\t/g, "  ").length;
            return { line, idx: idx + 1, role, depth: Math.floor(spaces / 2) };
          })
          .filter(Boolean)
          .slice(0, 80);
        // SPEC v1: W/H/LOC + boss split
        const rolesAll = source.map(s => s.role);
        const raw = [];
        source.forEach((item, i) => {
          const status = item.role === "recovery" ? "critical"
            : item.role === "branch" || item.role === "state" || item.role === "helper" ? "watch"
            : "stable";
          const loc = locForRole(item.role);
          const depth = item.depth || 0;
          const siblings = rolesAll.filter(r => r === item.role).length - 1;
          const fanout = (i > 0 ? 1 : 0) + (i < source.length - 1 ? 1 : 0);
          const block = {
            id: `${strategyId}-block-${i + 1}`,
            kind: roleToKind(item.role),
            role: item.role,
            label: item.line.trim().slice(0, 28) || item.role,
            file,
            lineStart: item.idx, lineEnd: item.idx,
            strategyId, order: i + 1, rotation: 0,
            confidence: item.role === "function" || item.role === "return" ? 86
              : item.role === "branch" ? 78 : 70,
            impact: item.role === "route" ? 62 : item.role === "function" ? 52 : 34,
            status,
            connectsTo: i < source.length - 1 ? [`${strategyId}-block-${i + 2}`] : [],
            dependsOn: i > 0 ? [`${strategyId}-block-${i}`] : [],
            loc, depth,
            widthUnits: mapStructureToWidth(siblings, fanout),
            heightUnits: mapLocToHeight(loc, depth, role),
          };
          splitIfBoss(block).forEach(b => raw.push(b));
        });
        return layoutBlocks(strategyId, raw);
      }

      function buildImportedStrategies(session) {
        const files = collectFilesFromSession(session);
        const candidates = deriveStrategyCandidates(session);
        const selectedId = selectStrategyIdFromSession(session, candidates);
        const primary = choosePrimaryCode(files);
        const risk = deriveRisk(session);
        const verdict = deriveVerdict(session);
        const trace = summarizeTraceFromSession(session,
          candidates.find(c => c.id === selectedId)?.name ?? selectedId);
        const impactMap = buildImpactMapFromFiles(files);
        const graph = buildDependencyGraphFromFiles(files);
        return candidates.map((c, idx) => {
          const isSel = c.id === selectedId;
          const confidence = Math.max(55, Math.min(95,
            Math.round((c.confidence ?? 76) + (isSel ? 8 : -4))));
          const blocks = patchTextToBlocks(c.id, primary.before, primary.after, primary.file);
          return {
            id: c.id,
            name: c.name,
            summary: c.reason ?? `${session.meta.sourceTool} session imported into TraceForge.`,
            reason: c.reason ?? "Imported from external coding trace.",
            risk, confidence,
            impact: Math.min(85, 30 + files.length * 10),
            complexity: Math.min(90, 25 + session.events.length * 2),
            files: files.map(f => f.path),
            diff: [
              `Imported ${session.events.filter(e => e.type === "patch_applied").length} applied patches`,
              `Imported ${session.events.filter(e => e.type === "patch_rejected").length} rejected patches`,
              `Source tool: ${session.meta.sourceTool}`,
            ],
            decompose: [
              "Context merge: imported external coding session.",
              "Strategy split: derived from normalized trace candidates.",
              "Re-merge: selected imported strategy becomes replay source.",
            ],
            trace, verdict,
            codeBefore: primary.before,
            codeAfter: primary.after,
            impactMap,
            diffLines: buildDiffLines(primary.before, primary.after),
            dependencyNodes: graph.nodes,
            dependencyEdges: graph.edges,
            blocks,
          };
        });
      }

      function buildStudioImportState(session) {
        const strategies = buildImportedStrategies(session);
        const cands = deriveStrategyCandidates(session);
        const selectedId = selectStrategyIdFromSession(session, cands);
        const files = collectFilesFromSession(session);
        const promptEvent = session.events.find(e => e.type === "prompt_received");
        const primary = choosePrimaryCode(files);
        return {
          prompt: promptEvent?.prompt ?? session.meta.userPrompt ?? "Imported coding session",
          files: files.map(f => f.path).join(", "),
          codeInput: primary.after || primary.before,
          selectedId,
          strategies,
          analyzerPayload: {
            imported: true,
            sourceTool: session.meta.sourceTool,
            sessionId: session.meta.sessionId,
            startedAt: session.meta.startedAt,
            fileCount: files.length,
            eventCount: session.events.length,
            changedFiles: files.map(f => f.path),
          },
          sessionMeta: session.meta,
        };
      }

            .map(l => detectRoleFromLine(l))
            .filter(Boolean);
          let lineRoleIdx = 0;
          lines.forEach((line, idx) => {
            const role = detectRoleFromLine(line);
            if (!role) return;
            const indent = (line.match(/^[\s\t]*/) || [""])[0].replace(/\t/g, "  ").length;
            const depth = Math.floor(indent / 2);
            const loc = locForRole(role);
            const siblings = rolesAll.filter(r => r === role).length - 1;
            const fanout = (lineRoleIdx > 0 ? 1 : 0) + (lineRoleIdx < rolesAll.length - 1 ? 1 : 0);
            const status = role === "recovery" ? "critical"
              : ["branch", "state", "helper"].includes(role) ? "watch"
              : "stable";
            const block = {
              id: `${id}-${order}`,
              kind: roleToKind(role),
              role,
              label: line.trim().slice(0, 28) || role,
              file: path,
              lineStart: idx + 1,
              lineEnd: idx + 1,
              strategyId: id,
              order: order,
              rotation: 0,
              confidence: 80,

              connectsTo: [],
              dependsOn: [],
              loc, depth,
              widthUnits: mapStructureToWidth(siblings, fanout),
              heightUnits: mapLocToHeight(loc, depth, role),
            };
            splitIfBoss(block).forEach(b => { allRaw.push(b); });
            order += 1;
            lineRoleIdx += 1;
          });
        });
        if (allRaw.length === 0) return null;
        const blocks = layoutBlocks(id, allRaw);
        const codeAfter = files.map(f => `// ${f.path}\n${f.code}`).join("\n\n");
        const strategy = {

          complexity: summary.complexity,

          decompose: [summary.desc],

            strength: i === 0 ? "high" : "medium",

        return {

          // 모든 파일 합쳐서 codeInput — 라인 카운트 정확히

import { AuthError } from "../errors/auth-error";

export function validateUser(user, password) {
  if (!user) {
    return false;
  }
  if (user.locked) {
    throw new AuthError("locked");
  }
  return hash(password) === user.hash;

export function checkPasswordRules(password) {

  if (!/[A-Z]/.test(password)) return false;

  return email.trim().toLowerCase();
}

export function maskEmail(email) {
  const [name, domain] = email.split("@");
  if (name.length <= 2) return email;
  return name[0] + "***@" + domain;
}

export async function login(email, password) {

  const user = await db.find(norm);
  if (!user) return null;

  if (existing) {

          default:                                       return "o";
        }
      }

      // Role → Orientation (pieceIndex-based distribution)
      function roleToOrientation(role, context) {
        const ctx = context || {};
        const isPrimaryCore = !!ctx.isPrimaryCore;
        const pieceIndex = ctx.pieceIndex || 0;
        const cat = roleToBuildingCategory(role);

        if (cat === "foundation") return "flat";

        if (cat === "core") {
          // 첫 piece(isPrimaryCore)만 vertical, 나머지는 horizontal-x/z 교차
          if (isPrimaryCore && pieceIndex === 0) return "vertical";
          return pieceIndex % 2 === 0 ? "horizontal-x" : "horizontal-z";
        }

        if (cat === "span") {
          if (role === "helper" || role === "adapter") {
            const dirs = ["left", "right", "front", "back"];
            return dirs[pieceIndex % dirs.length];
          }
          return pieceIndex % 2 === 0 ? "horizontal-x" : "horizontal-z";
        }

        if (cat === "wing") {
          const dirs = ["left", "right", "front", "back"];
          return dirs[pieceIndex % dirs.length];
        }

        if (cat === "cap") {
          if (role === "return") {
            const dirs = ["back", "left", "right", "front"];
            return dirs[pieceIndex % dirs.length];
          }
          return pieceIndex % 2 === 0 ? "horizontal-x" : "horizontal-z";
        }

        return "default";
      }

      // 빌더 — role → piece → orientation → cells (origin 적용 X, normalize O)
      function buildPieceCells(role, context) {
        const piece = POLYCUBE_V1[roleToPiece(role)];
        const orientation = roleToOrientation(role, context);
        return piece.cells[orientation] || piece.cells.default;
      }

      // 호환 alias
      function roleToPolycube(role) { return roleToPiece(role); }
      function polycubeCells(piece, _orientation) {
        const def = POLYCUBE_V1[piece] || POLYCUBE_V1.o;
        return def.cells.default;
      }
      function roleToKind(role) {
        return roleToPiece(role).toUpperCase(); // i → "I", o → "O" 등
      }

      function detectRoleFromLine(line) {
        const s = line.trim();
        if (!s) return null;
        // 주석 제외
        if (/^(\/\/|\/\*|\*\s|#(?!\w))/.test(s)) return null;
        // 1) import
        if (/^(import|from)\s|require\s*\(/.test(s)) return "import";
        // 2) loop — 배열 메서드 + for/while (어디 위치든)
        if (/\b(forEach|map|filter|reduce|some|every|find|flatMap)\s*\(|\bfor\s*\(|\bwhile\s*\(/.test(s)) return "loop";
        // 3) recovery — try/catch/finally/throw (앞에 `}` 허용)
        if (/\b(try|catch|finally)\s*[\(\{]|\bthrow\b/.test(s)) return "recovery";
        // 4) branch — if/else/switch (앞에 `}` 허용)
        if (/\b(if|else\s+if|else|switch)\s*[\(\{]/.test(s)) return "branch";
        // 5) return — JSX 컴포넌트 리턴도 잡음
        if (/\breturn\s*\(/.test(s)) return "return";
        if (/\breturn\b/.test(s)) return "return";
        // JSX 태그 (열림/닫힘) — state (컴포넌트 트리 구성)
        if (/^\s*<[A-Z]\w*\s*|^\s*<[a-z]+\s|^\s*<\/\w+>/.test(s)) return "state";
        // 6) function / class
        if (/\b(function)\s+\w+|\bfunction\s*\(|=>\s*[\(\{]|^\s*(export\s+)?(async\s+)?\w+\s*[:=]\s*(async\s+)?\([^)]*\)\s*=>|^def\s+\w+/.test(s)) return "function";
        if (/\bclass\s+\w+/.test(s)) return "class";
        // 7) route
        if (/(Response|NextResponse)\.\w+|\bapp\.(get|post|put|delete|patch)\b|\brouter\.(get|post|put|delete)\b/.test(s)) return "route";
        // 8) state (React hooks 포함)
        if (/^(const|let|var)\s+\w+\s*=|\buse(State|Effect|Callback|Memo|Ref|Reducer|Context)\s*\(/.test(s)) return "state";
        // 9) helper — 일반 호출, 체이닝, await, 할당, 표현식
        if (

          /\.\w+\s*\(/.test(s) ||                      // 메서드 체이닝
          /\bawait\s+\w+/.test(s) ||                   // await foo()
          /^[\w.]+\s*[+\-*/=]/.test(s) ||              // 변수 = 값 / 산술
          /^\s*\}\s*\)\s*[;,]?\s*$/.test(s) === false && /^\w+[\w.[\]]+\s*[+\-*/=]/.test(s) // 객체 속성 할당
        ) return "helper";
        return null;
      }

      // 20,000 line cap (large codebases supported)
      const MAX_LINES = 20000;
      // function/class/route의 실제 span 추정 — 같은 depth의 다음 같은 종류까지
      function inferFunctionSpans(nodes, totalLines) {
        const blocky = ["function", "class", "route"];
        nodes.forEach((n, i) => {
          if (!blocky.includes(n.role)) return;
          // 다음 같은 종류 노드 찾기 (depth ≤ 현재)

      function parseWithMockLineParser(code) {

          const spaces = leading.replace(/\t/g, "  ").length;

      // Y = role별 Y offset + depth 증가

      function fileColumn(files, file) {

        if (/\/(infra|db|repo|repository|store|persistence)\//.test(p)) return 3; // rear: infra

      // ===== ARCHITECTURE LAYER =====
      // Python = Structural / JSON = Semantic / Three.js·UI = Presentation
      // Build Order: Structural Pass → Semantic Pass → Presentation Pass
      function architectureLayer(filePath) {
        const p = (filePath || "").toLowerCase();
        const ext = p.split(".").pop();
        // Presentation: UI / 렌더 / 표현
        if (["tsx", "jsx", "css", "scss", "sass", "less", "html", "vue", "svelte"].includes(ext)) return "presentation";

        if (["ts", "js", "mjs"].includes(ext)) return "structural";
        // 문서/표지
        if (["md", "mdx", "rst"].includes(ext)) return "presentation";

      // 한 파일이 단일 layer 아니라 S/Sm/P 가중치 (점수)로
      function architectureScores(filePath) {
        const p = (filePath || "").toLowerCase();
        const ext = p.split(".").pop();
        let s = 0, sm = 0, pr = 0;
        // 확장자 기본 점수
        if (ext === "py") s += 10;
        else if (["go", "rs", "java", "kt", "swift", "c", "cpp", "h", "rb"].includes(ext)) s += 9;
        else if (["ts", "js", "mjs"].includes(ext)) s += 6;       // bridge → 약간 structural
        else if (["tsx", "jsx", "vue", "svelte"].includes(ext)) { pr += 6; s += 2; }
        else if (["json", "yaml", "yml", "toml", "xml", "ini", "env"].includes(ext)) sm += 9;
        else if (["css", "scss", "sass", "less"].includes(ext)) pr += 8;
        else if (["md", "mdx", "rst"].includes(ext)) pr += 5;
        else if (ext === "html") { pr += 6; s += 2; }
        else if (["sh", "bash", "zsh", "ps1"].includes(ext)) s += 5;

        if (/\/(api|routes?|service|services|handlers?)\//.test(p)) s += 3;
        if (/\/(lib|core|domain|model|models)\//.test(p)) s += 4;
        if (/\/(infra|db|repo|repository|store|persistence)\//.test(p)) s += 3;
        if (/\/(config|schema|configs?|settings)\//.test(p)) sm += 4;
        // 보조: schema-aware structural (route + JSON 파일 함께)

        if (s + sm + pr === 0) s = 1; // 미분류는 기본 structural

      }

      function architectureWeights(filePath) {
        const sc = architectureScores(filePath);
        const total = sc.structural + sc.semantic + sc.presentation;
        const w = {
          s: sc.structural / total,
          sm: sc.semantic / total,
          pr: sc.presentation / total,
        };
        return { scores: sc, weights: w, total };
      }

      // ===== Semantic pattern texture (panel grid + 창문 리듬) =====
      const _SEMANTIC_TEX_CACHE = new Map();
      function getSemanticPatternTexture(themeBaseColor, density) {
        const key = `${themeBaseColor}|${density}`;
        let tex = _SEMANTIC_TEX_CACHE.get(key);
        if (tex) return tex;
        const c = document.createElement("canvas");
        c.width = c.height = 128;
        const ctx = c.getContext("2d");
        ctx.fillStyle = `rgba(15,23,42,${0.18 + density * 0.25})`;
        ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = `rgba(148,163,184,${0.35 + density * 0.4})`;
        ctx.lineWidth = 1;
        const step = 16;
        for (let i = 0; i <= 128; i += step) {
          ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(128, i); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 128); ctx.stroke();
        }
        // 창문 리듬 — density 따라
        ctx.fillStyle = `rgba(252,211,77,${0.25 + density * 0.55})`;
        const winStep = density >= 0.5 ? 16 : 32;
        for (let y = 6; y < 128; y += winStep) {
          for (let x = 6; x < 128; x += winStep) {
            ctx.fillRect(x, y, 4, 4);
          }

        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(2, 2);
        _SEMANTIC_TEX_CACHE.set(key, tex);
        return tex;
      }

      function fileToKind(filePath) {
        const ext = (filePath || "").split(".").pop().toLowerCase();
        if (ext === "py") return "frame";
        if (["ts", "tsx", "js", "jsx", "mjs"].includes(ext)) return "glass";
        if (["json", "yaml", "yml", "toml"].includes(ext)) return "interior";
        if (["css", "scss", "sass", "less"].includes(ext)) return "paint";
        if (["md", "mdx", "rst"].includes(ext)) return "signage";
        if (ext === "html") return "shell";
        if (["sh", "bash", "zsh", "ps1"].includes(ext)) return "pipe";
        if (["go", "rs", "java", "kt", "swift", "c", "cpp", "h"].includes(ext)) return "frame";
        return "standard";
      }

      function inferMaterial(filePath, themeId) {
        const theme = THEMES[themeId] || THEMES.classic;
        const kind = fileToKind(filePath);
        const baseMat = theme.materials[kind] || theme.materials.standard;
        const scale = kind === "interior" ? 0.75 : kind === "signage" ? 0.85 : 1.0;
        // S/Sm/P weight blend
        const { weights: w } = architectureWeights(filePath);
        // Structural ↑ → roughness↑, opacity 유지
        // Presentation ↑ → metalness↑, emissive↑, opacity↓ (살짝 transparent)
        // Semantic ↑ → pattern texture overlay
        const roughness = Math.max(0.05, Math.min(1,
          (baseMat.roughness ?? 0.4) + w.s * 0.25 - w.pr * 0.18
        ));
        const metalness = Math.max(0, Math.min(1,
          (baseMat.metalness ?? 0.4) + w.pr * 0.25 - w.s * 0.05
        ));
        const opacity = Math.max(0.55, Math.min(1,
          (baseMat.opacity ?? 0.94) + w.s * 0.04 - w.pr * 0.08
        ));
        // emissive (presentation glow)
        const emissiveBoost = w.pr * 0.45 + w.sm * 0.12;
        return {
          kind, color: baseMat.color, scale,
          metalness, roughness, opacity, emissiveBoost,
          weights: w,
          hasPattern: w.sm >= 0.32, // Semantic 32% 이상이면 grid pattern overlay
          patternDensity: Math.min(1, w.sm * 1.6),
        };
      }

      const MATERIAL_KIND_NAMES = {
        frame: "골조", glass: "외장", interior: "인테리어", paint: "페인트",
        signage: "간판", shell: "외피", pipe: "배관", standard: "기본",
      };

      // role별 mock LOC (mock parser는 줄 단위라 부정확 → role별 추정)
      // 시각 변화 위해 휴리스틱 LOC 키움 (1줄 스택 → 큰 함수 = 큰 블록)
      const LOC_BY_ROLE = {
        import: 1, adapter: 2, state: 2, return: 2,
        branch: 6, loop: 10, recovery: 8, helper: 8,
        function: 24, class: 40, route: 18,
      };
      function locForRole(role) {
        return LOC_BY_ROLE[role] ?? 4;
      }

      // 5 lines = 1 cell, 20 lines = 1 block (4 cells)
      function locToCellCount(loc) {
        return Math.max(1, Math.ceil((loc || 1) / 5));
      }
      function cellCountToBlockCount(cellCount) {
        return Math.max(1, Math.ceil(cellCount / 4));
      }
      // LOC → piece count (20 lines = 1 piece). cap per category
      function locToPieceCount(loc) {
        return Math.max(1, Math.ceil((loc || 1) / 20));
      }
      function capPieceCountByCategory(role, pieceCount) {
        const cat = roleToBuildingCategory(role);
        if (cat === "foundation") return Math.min(pieceCount, 8);
        if (cat === "core") return Math.min(pieceCount, 5);
        if (cat === "span") return Math.min(pieceCount, 6);
        if (cat === "wing") return Math.min(pieceCount, 6);
        if (cat === "cap") return Math.min(pieceCount, 3);
        return Math.min(pieceCount, 5);
      }

      // role-aware height — 라인 → 블록 질량 → 높이 (core만 상승)
      function mapLocToHeight(loc, _depth, role) {
        const cat = roleToBuildingCategory(role || "");
        const cellCount = locToCellCount(loc || 1);
        const blockCount = cellCountToBlockCount(cellCount);
        if (cat === "foundation" || cat === "cap") return 1;
        if (cat === "wing") return blockCount >= 3 ? 2 : 1;
        if (cat === "span") return blockCount >= 4 ? 2 : 1;
        // core: 1블록 ≤ 1층, 2-3블록 = 2층, 4블록+ = 3층
        if (blockCount <= 1) return 1;
        if (blockCount <= 3) return 2;
        return 3;
      }

      // sibling + fanout → widthUnits (1~3)
      function mapStructureToWidth(siblings, fanout) {
        const v = ((siblings || 0) / 3) + ((fanout || 0) / 2);
        if (v < 1) return 1;
        if (v < 2.5) return 2;
        return W_CAP;
      }

      // boss block 분해 — 큰 LOC를 여러 sub-block으로 (X로 분산되게 _subIndex 부여)
      function splitIfBoss(rawNode) {
        if (!rawNode) return [rawNode];
        const loc = rawNode.loc || locForRole(rawNode.role);
        if (loc < BOSS_LOC_THRESHOLD) return [rawNode];
        const count = Math.min(4, Math.ceil(loc / 30));
        const subLoc = Math.ceil(loc / count);
        const subs = [];
        for (let i = 0; i < count; i += 1) {
          subs.push({
            ...rawNode,
            id: `${rawNode.id}-sub${i + 1}`,
            label: i === 0 ? rawNode.label : `${rawNode.label} (${i + 1}/${count})`,
            loc: subLoc,
            heightUnits: 1,           // 높이 키우지 말고 _subIndex로 X 분산
            widthUnits: rawNode.widthUnits || 1,
            _subIndex: i,
            _subTotal: count,
          });
        }
        return subs;
      }

      // 한 파일 내 = 단일 X 컬럼 (전부 중앙 정렬) — 진짜 테트리스 stack
      // 시각 다양성은 kind(모양) + rotation(회전) + status(색)으로 표현
      function roleXOffset(role, order, branchSide) {
        return 0;
      }

      // 3D plane clear — 같은 Y 층의 X×Z 평면이 꽉 차면 그 층 제거 (Spec §6)
      function applyLineClears(blocksData, playfieldWidth, depthDim) {
        // blocksData = [{ offsetX, offsetZ, dropY, cells: [[cx,cy,cz]], ...origItem }]
        const planeCapacity = playfieldWidth * Math.max(1, depthDim || 4);
        let totalCleared = 0;
        let activeBlocks = blocksData.map(b => ({ ...b, alive: true, cellsLive: [...b.cells] }));
        let pass = 0;
        while (pass < 8) {
          // 각 Y 층의 점유 셀 수 카운트
          const layerCount = new Map();
          activeBlocks.forEach(b => {
            if (!b.alive) return;
            b.cellsLive.forEach(([_cx, cy, _cz]) => {
              const y = b.dropY + cy;
              layerCount.set(y, (layerCount.get(y) || 0) + 1);
            });
          });
          const cleared = [...layerCount.entries()]
            .filter(([_y, c]) => c >= planeCapacity)
            .map(([y]) => y)
            .sort((a, b) => a - b);
          if (!cleared.length) break;
          totalCleared += cleared.length;

          // cleared 층 안의 cells 제거 + 위 cells 하강
          activeBlocks = activeBlocks.map(b => {
            if (!b.alive) return b;
            const survive = b.cellsLive.filter(([_cx, cy, _cz]) => !cleared.includes(b.dropY + cy));
            if (survive.length === 0) return { ...b, alive: false };
            const minRow = Math.min(...survive.map(([_cx, cy, _cz]) => b.dropY + cy));
            const droppedBelow = cleared.filter(y => y < minRow).length;
            return { ...b, cellsLive: survive, dropY: b.dropY - droppedBelow };
          }).filter(b => b.alive);
          pass += 1;
        }
        return { blocks: activeBlocks, cleared: totalCleared };
      }

      // 3D Polycube 레이아웃 — XZ 평면에서 collision drop, plane clear (Spec v1)
      const POLYCUBE_DEPTH = 6; // playfield Z 깊이 (4 → 6: wing zone에 J/L/T 4방향 회전 수용)

      function layoutBlocks(strategyId, raw) {
        if (!raw || raw.length === 0) return [];
        const files = [...new Set(raw.map(item => item.file || "unknown"))];
        if (files.length === 0) files.push("unknown");
        const fileWidth = Math.max(4, Math.floor(PLAYFIELD_WIDTH / files.length));
        const playfieldWidth = fileWidth * files.length;
        const center = (playfieldWidth - 1) / 2;
        const depthCenter = (POLYCUBE_DEPTH - 1) / 2;
        // 3D playfield — cells: Set("x,y,z"), profile: Map("x,z" → top y)
        const playfield = { cells: new Set(), profile: new Map() };
        const branchFlipMap = new Map();

        // Build Order 정렬: Structural → Semantic → Presentation
        const sortedRaw = [...raw].sort((a, b) => {
          const la = ARCH_LAYER_ORDER[architectureLayer(a.file)] ?? 0;
          const lb = ARCH_LAYER_ORDER[architectureLayer(b.file)] ?? 0;
          if (la !== lb) return la - lb;
          return (a.order || 0) - (b.order || 0);
        });

        // 1단계: BUILDING MODE — plot 기반 건축 조립
        const plots = BUILDING_MODE ? buildPlots(files, playfieldWidth, POLYCUBE_DEPTH) : null;
        const placed = sortedRaw.map((item, i) => {
          const fileKey = item.file || "unknown";
          let p;
          if (BUILDING_MODE) {
            p = placeOnPlayfieldBuildingMode(item, playfield, plots, POLYCUBE_DEPTH);
            if (!p) {
              // fallback: legacy drop
              const branchFlip = branchFlipMap.get(fileKey) ?? 0;
              p = placeOnPlayfield(item, playfield, files, branchFlip, i, fileWidth, POLYCUBE_DEPTH);
            }
          } else {
            const branchFlip = branchFlipMap.get(fileKey) ?? 0;
            p = placeOnPlayfield(item, playfield, files, branchFlip, i, fileWidth, POLYCUBE_DEPTH);
            if (item.role === "branch") branchFlipMap.set(fileKey, branchFlip + 1);
          }
          return {
            origItem: item,
            offsetX: p.offsetX,
            offsetZ: p.offsetZ,
            dropY: p.dropY,
            cells: p.cells,
            overhang: p.overhang,
            piece: p.piece,
            rotation: p.rotation,
          };
        });

        // 2단계: BUILDING MODE에선 plane clear 비활성화 (게임 X, 건축 O)
        const cleared = BUILDING_MODE
          ? placed.map(b => ({ ...b, alive: true, cellsLive: b.cells }))
          : applyLineClears(placed, playfieldWidth, POLYCUBE_DEPTH).blocks;
        const linesCleared = 0;

        // 3단계: 좌표 변환 (3D world)
        return cleared.map((b, idx) => {
          const x = (b.offsetX - center) * SCALE;
          const y = b.dropY * SCALE;
          // Z는 이제 piece 셀 점유 + offsetZ. 그룹 위치 = depth section center.
          const z = (b.offsetZ - depthCenter) * SCALE;
          // 셀은 group 기준 상대 좌표 (offsetZ는 이미 group.z에 포함되었으므로 z=0부터)
          const cells3d = b.cellsLive.map(([cx, cy, cz]) => [cx, cy, cz]);
          const archLayer = architectureLayer(b.origItem.file);
          const archW = architectureWeights(b.origItem.file).weights;
          const out = {
            ...b.origItem,
            strategyId,
            kind: b.piece, // Polycube 이름을 kind로 사용
            x, y, z,
            rotation: b.rotation || 0,
            overhang: b.overhang,
            _cells: cells3d,
            _piece: b.piece,
            _archLayer: archLayer,
            _archLayerShort: ARCH_LAYER_SHORT[archLayer],
            _archWeights: archW,
          };
          if (idx === 0) {
            out._playfieldWidth = playfieldWidth;
            out._filesCount = files.length;
            out._fileWidth = fileWidth;
            out._linesCleared = linesCleared;
            out._playfieldDepth = POLYCUBE_DEPTH;
          }
          return out;
        });
      }

      // variant별 role→file 매핑 (여러 파일로 분산 → 가로 퍼짐)
      function fileForRole(role, variant) {
        if (variant === "route") {
          if (role === "recovery" || role === "return") return "app/api/login/route.ts";
          if (role === "import" || role === "adapter") return "lib/auth.ts";
          return "app/api/login/route.ts";
        }
        if (variant === "service") {
          if (role === "import") return "lib/auth.ts";
          if (role === "function" || role === "branch" || role === "return") return "lib/auth.ts";
          if (role === "helper" || role === "adapter" || role === "state" || role === "loop") return "services/auth-service.ts";
          return "services/auth-service.ts";
        }
        // extend — 단일 파일 (좁은 타워)
        return "lib/auth.ts";
      }

      // line nodes를 같은 role/근접 depth/근접 lineStart로 묶어 section 단위로 압축
      function buildSections(nodes) {
        if (!nodes.length) return [];
        const sections = [];
        let cur = {
          role: nodes[0].role,
          lineStart: nodes[0].lineStart,
          lineEnd: nodes[0].lineEnd,
          depthSum: nodes[0].depth || 0,
          count: 1,
          labels: [nodes[0].label],
          confidence: nodes[0].confidence || 0.7,
        };
        for (let i = 1; i < nodes.length; i++) {
          const n = nodes[i];
          const sameRole = n.role === cur.role;
          const nearDepth = Math.abs((n.depth || 0) - (cur.depthSum / cur.count)) <= 1;
          const closeLines = n.lineStart - cur.lineEnd <= 12;
          if (sameRole && nearDepth && closeLines) {
            cur.lineEnd = n.lineEnd;
            cur.depthSum += (n.depth || 0);
            cur.count += 1;
            if (cur.labels.length < 3) cur.labels.push(n.label);
          } else {
            sections.push(cur);
            cur = {
              role: n.role,
              lineStart: n.lineStart,
              lineEnd: n.lineEnd,
              depthSum: n.depth || 0,
              count: 1,
              labels: [n.label],
              confidence: n.confidence || 0.7,
            };
          }
        }
        sections.push(cur);
        return sections;
      }

      function buildBlocksFromParser(strategyId, variant, parserResult) {
        const fallbackRoles = variant === "extend"
          ? ["import", "function", "branch", "return"]
          : variant === "service"
            ? ["import", "function", "helper", "return"]
            : ["route", "recovery", "return"];
        const sourceNodes = parserResult.nodes.length
          ? parserResult.nodes
          : fallbackRoles.map((role, i) => ({
              id: `fallback-${i + 1}`, role, label: role,
              lineStart: i + 1, lineEnd: i + 1, confidence: 0.7, depth: 0,
            }));
        // 섹션 다양성 보장 — role별로 골고루 샘플링
        const maxSections = Math.max(8, Math.min(60, Math.ceil(sourceNodes.length / 25)));
        const allSections = buildSections(sourceNodes);
        const byRole = {};
        allSections.forEach(s => {
          if (!byRole[s.role]) byRole[s.role] = [];
          byRole[s.role].push(s);
        });
        const roles = Object.keys(byRole);
        const minPerRole = Math.min(2, Math.floor(maxSections / Math.max(1, roles.length)));
        const picked = [];
        roles.forEach(r => {
          picked.push(...byRole[r].slice(0, minPerRole));
        });
        const remaining = allSections.filter(s => !picked.includes(s));
        const sections = picked.concat(remaining).slice(0, maxSections)
          .sort((a, b) => a.lineStart - b.lineStart);
        // 각 section 균등 500줄 cap (마지막 포함) — 한 블록 폭주 방지
        const MAX_SECTION_SPAN = 500;
        const codeTotalLines = parserResult.totalLines || 0;
        for (let i = 0; i < sections.length; i++) {
          const sectionCap = sections[i].lineStart + MAX_SECTION_SPAN - 1;
          let targetEnd;
          if (i < sections.length - 1) {
            const gapEnd = sections[i + 1].lineStart - 1;
            targetEnd = Math.min(gapEnd, sectionCap);
          } else {
            targetEnd = Math.min(codeTotalLines || sectionCap, sectionCap);
          }
          if (targetEnd > sections[i].lineEnd) sections[i].lineEnd = targetEnd;
        }
        // 꼬리 padding — 6개 cap, role 순환 (헬퍼 L 폭주 방지하면서 tail 더 커버)
        if (sections.length > 0 && codeTotalLines > 0) {
          const lastEnd = sections[sections.length - 1].lineEnd;
          const remaining = codeTotalLines - lastEnd;
          if (remaining > 0) {
            const padCount = Math.min(6, Math.ceil(remaining / 1200));
            const padSpan = Math.ceil(remaining / padCount);
            // 6 role 순환 → L 6개 폭주 X
            const padRoles = ["helper", "import", "function", "branch", "loop", "state"];
            for (let p = 0; p < padCount; p++) {
              const cursor = lastEnd + 1 + p * padSpan;
              const virtEnd = Math.min(cursor + padSpan - 1, codeTotalLines);
              sections.push({
                role: padRoles[p % padRoles.length],
                lineStart: cursor,
                lineEnd: virtEnd,
                depthSum: 0,
                count: 1,
                labels: ["tail"],
                confidence: 0.5,
              });
            }
          }
        }

        const raw = [];
        let nextOrder = 1;
        sections.forEach((section) => {
          const role = section.role;
          const file = fileForRole(role, variant);
          const loc = Math.max(1, section.lineEnd - section.lineStart + 1);
          const isPadding = section.labels && section.labels[0] === "tail";
          // padding도 정상 분할 (단, category cap이 폭주 방지)
          const pieceCountRaw = locToPieceCount(loc);
          const pieceCount = capPieceCountByCategory(role, pieceCountRaw);
          const pieceLoc = Math.max(1, Math.ceil(loc / pieceCount));
          const depth = Math.round(section.depthSum / section.count);
          const cat = roleToBuildingCategory(role);
          for (let p = 0; p < pieceCount; p++) {
            raw.push({
              id: `${strategyId}-s${section.lineStart}-p${p + 1}`,
              kind: roleToKind(role),
              role,
              label: p === 0 ? (section.labels[0] || role) : `${role} ${p + 1}`,
              file,
              lineStart: section.lineStart,
              lineEnd: section.lineEnd,
              strategyId,
              order: nextOrder++,
              rotation: 0,
              confidence: Math.round((section.confidence || 0.7) * 100),
              impact: role === "route" ? 62 : role === "function" ? 52 : 34,
              status:
                role === "recovery" ? "critical"
                : ["branch", "state", "helper"].includes(role) ? "watch"
                : "stable",
              connectsTo: [],
              dependsOn: [],
              loc: pieceLoc,
              depth,
              pieceIndex: p,
              pieceCount,
              isPrimaryCore: cat === "core" && p === 0,
              widthUnits: 1,
              heightUnits: 1,
              _subIndex: p,
              _subTotal: pieceCount,
            });
          }
        });

        if (variant === "service") {
          raw.push({
            id: `${strategyId}-service-tail`,
            kind: "J", role: "helper", label: "authService boundary",
            file: "services/auth-service.ts",
            lineStart: sections.length + 1, lineEnd: sections.length + 1,
            strategyId, order: raw.length + 1, rotation: 0,
            confidence: 72, impact: 63, status: "watch",
            connectsTo: [], dependsOn: raw.length ? [raw[raw.length - 1].id] : [],
            loc: 5, depth: 0, widthUnits: 1, heightUnits: 1,
          });
        }
        // Helper / branch wing 자동 보충 — 매우 부족할 때만 (이전엔 raw/6 → L 폭주)
        const wingCount = raw.filter(b =>
          b.role === "helper" || b.role === "adapter" ||
          b.role === "branch" || b.role === "if"
        ).length;
        // 6 → 12로 줄임. 최대 6개만 보충
        const wantWings = Math.min(6, Math.max(2, Math.floor(raw.length / 12)));
        if (wingCount < wantWings) {
          for (let h = wingCount, i = 0; h < wantWings; h++, i++) {
            const refBlock = raw[i % raw.length] || {};
            raw.push({
              id: `${strategyId}-synth-wing-${h}`,
              kind: "L",
              role: "helper",
              label: "wing",
              file: refBlock.file || "synthetic",
              lineStart: refBlock.lineStart || 1,
              lineEnd: (refBlock.lineStart || 1),
              strategyId,
              order: raw.length + h + 1,
              rotation: 0,
              confidence: 60, impact: 30, status: "stable",
              connectsTo: [], dependsOn: [],
              loc: 8, depth: 0, widthUnits: 1, heightUnits: 1,
              _synth: true,
            });
          }
        }
        return layoutBlocks(strategyId, raw);
      }

      function evaluateFit(block, priorBlocks) {
        const targets = new Set(priorBlocks.map(b => b.id));
        const depMatched = block.dependsOn.filter(id => targets.has(id)).length;
        const dependencyMatch = block.dependsOn.length === 0 ? 0.9 : depMatched / block.dependsOn.length;
        const signatureMatch = block.kind === "I" || block.kind === "T" || block.kind === "O" ? 0.85 : 0.72;
        const orderMatch = priorBlocks.length === 0 ? 1
          : block.order > Math.max(...priorBlocks.map(b => b.order)) ? 0.95 : 0.4;
        const semanticMatch = block.status === "critical" ? 0.3 : block.status === "watch" ? 0.62 : 0.88;
        const finalFit = signatureMatch * 0.35 + dependencyMatch * 0.30 + orderMatch * 0.15 + semanticMatch * 0.20;
        return { signatureMatch, dependencyMatch, orderMatch, semanticMatch, finalFit };
      }

      // Vibe coding cadence — LLM이 토큰 스트림으로 코드 뿜는 속도를 반영
      // 기준: 평균 ~10 blocks/sec, role별 미세 가속, 파일 전환마다 짧은 pause
      const VIBE_FILE_PAUSE = 240;       // 파일 경계 — LLM이 다음 파일로 넘어가는 호흡
      const VIBE_FALL_FRAC = 0.35;       // spawn→fall 비율 (drop ease 시작)
      const VIBE_ROLE_DELAY = {
        import: 55,
        state: 75,
        helper: 85,
        return: 85,
        branch: 100,
        loop: 100,
        recovery: 105,
        route: 115,
        function: 130,
        class: 150,
      };
      const VIBE_DEFAULT_DELAY = 95;

      function buildReplayFramesV2(blocks) {
        const sorted = blocks.slice().sort((a, b) => a.order - b.order);
        const accepted = [];
        const meta = {};
        const frames = [];
        let cursor = 0;
        let prevFile = null;
        sorted.forEach((block, index) => {
          const fit = evaluateFit(block, accepted);
          meta[block.id] = fit;
          const action = fit.finalFit >= 0.8 ? "lock" : fit.finalFit >= 0.35 ? "ghost_lock" : "reject";
          // 파일 전환 시 LLM 호흡 — "다음 파일로 넘어가는" 자연스러운 pause
          const file = block.file || "unknown";
          if (prevFile !== null && file !== prevFile) {
            cursor += VIBE_FILE_PAUSE;
          }
          prevFile = file;
          const base = cursor;
          const delay = VIBE_ROLE_DELAY[block.role] || VIBE_DEFAULT_DELAY;
          const fallAt = base + Math.max(30, Math.round(delay * VIBE_FALL_FRAC));
          const settleAt = base + delay;
          frames.push({ step: index * 3 + 1, blockId: block.id, action: "spawn", timestamp: base, fit: fit.finalFit });
          frames.push({ step: index * 3 + 2, blockId: block.id, action: "fall", timestamp: fallAt, fit: fit.finalFit });
          frames.push({ step: index * 3 + 3, blockId: block.id, action, timestamp: settleAt, fit: fit.finalFit });
          cursor = settleAt;
          if (action !== "reject") accepted.push(block);
        });
        return { frames, meta };
      }

      // ---- 시맨틱 배치 규칙 (결정론) ----
      // 코드 의미 → 공간 위치·회전 직접 매핑
      // "시스템이 판단" = 어떤 role이 어디에, 어떻게 놓일지 코드 의미대로
      //
      // 공간 의미 (GRID_WIDTH=6 cells 폭)
      //   x=0~1   LEFT    : state, 좌측 branch
      //   x=2~3   CENTER  : function/class/route 기둥, return (마무리)
      //   x=4~5   RIGHT   : helper, recovery, 우측 branch, import 확장
      //   y       HEIGHT  : collision drop (자연 중력)
      //   rotation        : 0 = 곧게 / 90 = 눕힘 (흐름성: loop/recovery)
      const GRID_WIDTH = 6;

      // role → 파일 구역 안에서의 target X (fileWidth 비례, 0~fileWidth-1)
      function roleTargetX(role, order, branchFlip, fileWidth) {
        const w = Math.max(1, fileWidth);
        const left = 0;
        const right = Math.max(0, w - 2);
        const center = Math.floor(w / 2) - 1;
        if (role === "import" || role === "adapter") {
          // 균등 분포 (4개 슬롯)
          const slots = [0, Math.floor(w * 0.3), Math.floor(w * 0.55), Math.max(0, w - 2)];
          return slots[order % slots.length];
        }
        if (role === "function" || role === "class" || role === "route") return center;
        if (role === "branch") return branchFlip % 2 === 0 ? left : right;
        if (role === "loop") return center;
        if (role === "recovery") return right;
        if (role === "return") return center;
        if (role === "state") return left;
        if (role === "helper") return right;
        return center;
      }

      // ====================================================================
      // BUILDING MODE — plot-based assembly
      // ====================================================================
      const BUILDING_MODE = true;

      function roleToBuildingCategory(role) {
        // role → building category
        switch (role) {
          case "import": case "config":                  return "foundation";
          case "state":                                  return "foundation"; // 기반이지만 X spread 보너스 추가됨 (xPriorityForRole)
          case "function": case "class": case "route":  return "core";        // Y 우선
          case "helper": case "adapter":                 return "span";       // X 우선 (별동/측면 확장)
          case "loop": case "for":                       return "span";       // X/Y 중간 (브릿지)
          case "branch": case "if": case "else": case "switch": return "wing"; // X 우선 (분기/허브)
          case "recovery": case "try": case "catch":    return "wing";        // X/Y 중간 → wing 으로 묶음 (완충층)
          case "return":                                 return "cap";        // 마감
          default: return "foundation";
        }
      }

      // Role-specific X spread priority (baseline 1.0, higher = more spread within plot)
      function xPriorityForRole(role) {
        switch (role) {
          case "branch": case "if": case "else": case "switch": return 3.0; // 분기 = X 분산 최우선
          case "import": case "config":                          return 3.0; // foundation sweep-fill (바닥 고루 채움)
          case "helper": case "adapter":                         return 2.5; // 별동/측면
          case "state":                                          return 2.0;
          case "loop": case "for": case "recovery": case "try":  return 2.0;
          case "function": case "class": case "route":           return 0.5; // Y 우선
          default: return 1.0;
