        }
      }

      // Relaxed stack rules — piece count handles splitting, height capped at 2 stack
      function expandCellsByLoc(baseCells, role, loc) {
        const cat = roleToBuildingCategory(role);
        const pieceCount = locToPieceCount(loc || 1);
        // foundation / cap = 항상 1층
        if (cat === "foundation" || cat === "cap") return baseCells;
        // wing / span = 대부분 1층, pieceCount 4+ 일 때만 2층
        if (cat === "wing" || cat === "span") {
          if (pieceCount < 4) return baseCells;
          return [...baseCells, ...baseCells.map(([x, y, z]) => [x, y + 1, z])];
        }
        // core = 1조각은 1층, 그 이상은 최대 2층
        if (cat === "core") {
          if (pieceCount <= 1) return baseCells;
          return [...baseCells, ...baseCells.map(([x, y, z]) => [x, y + 1, z])];
        }
        return baseCells;
      }

      // 파일 plots — X×Z 대지 (folder layer로 Z band)
      // Subdivide file plot into 5 sub-zones (internal zoning)
      function clampZone(zone, plot) {
        return {
          x0: Math.max(plot.x0, Math.min(zone.x0, plot.x1)),
          x1: Math.max(plot.x0, Math.min(zone.x1, plot.x1)),
          z0: Math.max(plot.z0, Math.min(zone.z0, plot.z1)),
          z1: Math.max(plot.z0, Math.min(zone.z1, plot.z1)),
        };
      }

      function buildSubPlots(plot) {
        const width = Math.max(1, plot.x1 - plot.x0 + 1);
        const depth = Math.max(1, plot.z1 - plot.z0 + 1);
        const leftW = Math.max(1, Math.floor(width * 0.22));
        const rightW = Math.max(1, Math.floor(width * 0.22));
        const coreW = Math.max(1, width - leftW - rightW);
        const frontD = Math.max(1, Math.floor(depth * 0.25));
        const backD = Math.max(1, Math.floor(depth * 0.25));
        const coreX0 = plot.x0 + leftW;
        const coreX1 = coreX0 + coreW - 1;
        return {
          foundation: clampZone({ x0: plot.x0, x1: plot.x1, z0: plot.z0, z1: plot.z0 + frontD - 1 }, plot),
          core:       clampZone({ x0: coreX0, x1: coreX1, z0: plot.z0 + frontD, z1: plot.z1 - backD }, plot),
          wingLeft:   clampZone({ x0: plot.x0, x1: coreX0 - 1, z0: plot.z0 + frontD, z1: plot.z1 - backD }, plot),
          wingRight:  clampZone({ x0: coreX1 + 1, x1: plot.x1, z0: plot.z0 + frontD, z1: plot.z1 - backD }, plot),
          cap:        clampZone({ x0: plot.x0, x1: plot.x1, z0: plot.z1 - backD + 1, z1: plot.z1 }, plot),
        };
      }

      function zoneNameForItem(item) {
        const cat = roleToBuildingCategory(item.role);
        const sub = item._subIndex || 0;
        const order = item.order || 0;
        // Bug fix: small pieces (sub=0) clustering in one zone if only `sub` is used
        // → (sub + order)로 순환해야 모든 piece가 zone에 균등 분배
        if (cat === "core") {
          const cycle = ["core", "wingLeft", "core", "wingRight", "cap"];
          return cycle[(sub + order) % cycle.length];
        }
        if (cat === "wing") {
          const cycle = ["wingLeft", "wingRight", "wingLeft", "wingRight"];
          return cycle[(sub + order) % cycle.length];
        }
        if (cat === "span") {
          if (item.role === "helper" || item.role === "adapter") {
            const cycle = ["wingLeft", "wingRight"];
            return cycle[(sub + order) % cycle.length];
          }
          // loop는 core / wingLeft / wingRight 순환
          const cycle = ["core", "wingLeft", "wingRight"];
          return cycle[(sub + order) % cycle.length];
        }
        if (cat === "foundation") return "foundation";
        if (cat === "cap") return "cap";
        return "core";
      }

      function candidateOriginsForZone(_item, zone, pieceWidth, pieceDepth, preferredX) {
        const out = [];
        const xs = [];
        for (let x = zone.x0; x <= zone.x1 - pieceWidth + 1; x++) xs.push(x);
        // 거리 기준 정렬, 동점이면 right 우선 (왼쪽 쏠림 방지)
        xs.sort((a, b) => {
          const da = Math.abs(a - preferredX);
          const db = Math.abs(b - preferredX);
          if (da !== db) return da - db;
          return (a < preferredX ? 1 : 0) - (b < preferredX ? 1 : 0);
        });
        for (const x of xs) {
          for (let z = zone.z0; z <= zone.z1 - pieceDepth + 1; z++) {
            out.push({ x, z, preferredX });
          }
        }
        return out;
      }

      function buildPlots(files, playfieldWidth, playfieldDepth) {
        const fileWidth = Math.max(4, Math.floor(playfieldWidth / files.length));
        return files.map((file, i) => {
          const x0 = i * fileWidth;
          const x1 = x0 + fileWidth - 1;
          const layerBand = inferLayerBand(file);
          const zBands = { 0: [0, 1], 1: [1, 2], 2: [2, 3], 3: [2, 3] };
          const [z0, z1] = zBands[layerBand] || [0, playfieldDepth - 1];
          return { file, x0, x1, z0: Math.max(0, z0), z1: Math.min(playfieldDepth - 1, z1), fileWidth };
        });
      }

      function floorCoverage(playfield, plot, y) {
        let occupied = 0, total = 0;
        for (let x = plot.x0; x <= plot.x1; x++) {
          for (let z = plot.z0; z <= plot.z1; z++) {
            total++;
            if (playfield.cells.has(`${x},${y || 0},${z}`)) occupied++;
          }
        }
        return total === 0 ? 0 : occupied / total;
      }

      function allowedMaxYForCategory(category, plot, playfield) {
        const coverage = floorCoverage(playfield, plot, 0);
        // 바닥 50% 전에는 전부 1층만 (면적 먼저 채움)
        if (coverage < 0.50) return 0;
        // foundation은 끝까지 바닥
        if (category === "foundation") return 0;
        // cap도 아주 늦게만 위로
        if (category === "cap") return coverage >= 0.85 ? 1 : 0;
        // 중간 단계: core만 1층 상승 허용
        if (coverage < 0.70) return category === "core" ? 1 : 0;
        if (coverage < 0.85) return category === "core" ? 2 : 1;
        // 충분히 차야 core 3층
        if (category === "core") return 3;
        return 1;
      }

      function collidesAt(origin, cells, playfield, plot, depthDim) {
        for (const [cx, cy, cz] of cells) {
          const x = origin.x + cx;
          const y = origin.y + cy;
          const z = origin.z + cz;
          if (x < plot.x0 || x > plot.x1) return true;
          if (y < 0) return true;
          if (z < plot.z0 || z > plot.z1) return true;
          if (z < 0 || z >= depthDim) return true;
          if (playfield.cells.has(`${x},${y},${z}`)) return true;
        }
        return false;
      }

      // 중력 드롭 — piece가 바닥 or 기존 블록 위에 정확히 얹히는 y 계산
      function dropYForPiece(x, z, cells, playfield) {
        // piece 각 column의 최하 cell cy
        const colBottoms = {};
        for (const [cx, cy, cz] of cells) {
          const key = cx + "," + cz;
          if (colBottoms[key] === undefined || cy < colBottoms[key]) {
            colBottoms[key] = cy;
          }
        }
        // 각 column별 "이 piece가 앉을 수 있는 최소 y"의 최댓값
        let dropY = 0;
        for (const key in colBottoms) {
          const parts = key.split(",");
          const cx = Number(parts[0]);
          const cz = Number(parts[1]);
          const col = (x + cx) + "," + (z + cz);
          const topY = playfield.profile.get(col);
          const need = (topY === undefined ? 0 : topY + 1) - colBottoms[key];
          if (need > dropY) dropY = need;
        }
        return Math.max(0, dropY);
      }

      function commitCells(origin, cells, playfield) {
        for (const [cx, cy, cz] of cells) {
          const x = origin.x + cx;
          const y = origin.y + cy;
          const z = origin.z + cz;
          playfield.cells.add(`${x},${y},${z}`);
          const colKey = `${x},${z}`;
          const curr = playfield.profile.get(colKey);
          if (curr === undefined || curr < y) playfield.profile.set(colKey, y);
        }
      }

      function computeSupportScore(origin, cells, playfield) {
        let supported = 0, total = 0;
        for (const [cx, cy, cz] of cells) {
          const x = origin.x + cx, y = origin.y + cy, z = origin.z + cz;
          total++;
          if (y === 0) { supported++; continue; }
          if (playfield.cells.has(`${x},${y - 1},${z}`)) supported++;
        }
        return total === 0 ? 0 : supported / total;
      }

      function computeAdjacencyScore(origin, cells, playfield) {
        let touches = 0;
        for (const [cx, cy, cz] of cells) {
          const x = origin.x + cx, y = origin.y + cy, z = origin.z + cz;
          const neighbors = [[x+1,y,z],[x-1,y,z],[x,y,z+1],[x,y,z-1]];
          for (const [nx, ny, nz] of neighbors) {
            if (playfield.cells.has(`${nx},${ny},${nz}`)) touches++;
          }
        }
        return touches;
      }

      function computePlotBalanceScore(origin, plot, playfield) {
        // X spread is preferred. Empty X column within same plot = bonus.
        // 현재 plot 1층 col별 occupancy 보고, origin.x 에 가까운 col이 비어있으면 +
        let nearbyEmpty = 0;
        let total = 0;
        for (let dx = -1; dx <= 1; dx++) {
          const x = origin.x + dx;
          if (x < plot.x0 || x > plot.x1) continue;
          for (let z = plot.z0; z <= plot.z1; z++) {
            total++;
            if (!playfield.cells.has(`${x},0,${z}`)) nearbyEmpty++;
          }
        }
        return total === 0 ? 0 : nearbyEmpty / total;
      }

      function computeCrowdPenalty(origin, cells, playfield, _role) {
        // 너무 다닥다닥 붙으면 페널티
        let crowded = 0;
        for (const [cx, cy, cz] of cells) {
          const x = origin.x + cx, y = origin.y + cy, z = origin.z + cz;
          // 위에 뭔가 있으면 (cap이 안 되는 위치)
          if (playfield.cells.has(`${x},${y + 1},${z}`)) crowded++;
        }
        return crowded;
      }

      function scoreCandidate(origin, item, cells, playfield, plot) {
        const category = roleToBuildingCategory(item.role);
        const support = computeSupportScore(origin, cells, playfield);
        const adjacency = computeAdjacencyScore(origin, cells, playfield);
        const balance = computePlotBalanceScore(origin, plot, playfield);
        const crowd = computeCrowdPenalty(origin, cells, playfield, item.role);
        const heightPenalty = origin.y * 1.5;
        // Role-specific X spread priority (branch/helper emphasize spread)
        const xMultiplier = xPriorityForRole(item.role);
        let bias = 0;
        if (category === "foundation") bias += origin.y === 0 ? 8 : -20;
        if (category === "core")       bias += origin.y <= 1 ? 2 : 0;
        if (category === "wing")       bias += origin.y <= 2 ? 3 : -4;
        if (category === "cap")        bias += origin.y >= 1 ? 6 : -8;
        if (category === "span")       bias += origin.y <= 2 ? 2 : 0;
        // adjacency도 role별 조정 — function/class는 인접 중요(코어 응집), branch는 인접 페널티(분산 우선)
        const adjacencyWeight = (item.role === "branch" || item.role === "helper" || item.role === "adapter")
          ? 0.5 : 3;
        return support * 5
             + adjacency * adjacencyWeight
             + balance * (2 * xMultiplier)
             + bias
             - crowd * 3
             - heightPenalty;
      }

      function placeOnPlayfieldBuildingMode(item, playfield, plots, depthDim) {
        const plot = plots.find(p => p.file === (item.file || "unknown")) || plots[0];
        const subPlots = buildSubPlots(plot);
        const zoneName = zoneNameForItem(item);
        const zone = subPlots[zoneName] || plot;
        const piece = roleToPiece(item.role);
        const orderIdx = item.order || 0;
        const dirs = ["left", "right", "front", "back"];
        // 대표 코어 판단 — 같은 파일 core 중 앞쪽 2개 + loc 큰 것만 세움
        const sameFileCore = (item.file || "") + "::core";
        if (!playfield._coreCount) playfield._coreCount = new Map();
        const currentCoreCount = playfield._coreCount.get(sameFileCore) || 0;
        // Strong cap: at most 1 vertical I per file
        const isPrimaryCore =
          roleToBuildingCategory(item.role) === "core" &&
          currentCoreCount < 1 &&
          (item.pieceIndex || 0) === 0 &&
          item.isPrimaryCore;
        const pieceIdx = item.pieceIndex || 0;
        const ctx = {
          direction: dirs[(pieceIdx || orderIdx) % 4],
          axis: (pieceIdx || orderIdx) % 2 === 0 ? "x" : "z",
          isPrimaryCore,
          pieceIndex: pieceIdx,
          pieceCount: item.pieceCount || 1,
        };
        const orientation = roleToOrientation(item.role, ctx);
        const pieceDef = POLYCUBE_V1[piece];
        const baseCells = pieceDef.cells[orientation] || pieceDef.cells.default;
        const loc = Math.max(1, item.loc || 1);
        const cells = expandCellsByLoc(baseCells, item.role, loc);
        const pieceWidth = Math.max(...cells.map(c => c[0])) + 1;
        const pieceDepth = Math.max(...cells.map(c => c[2])) + 1;
        const category = roleToBuildingCategory(item.role);
        const maxY = allowedMaxYForCategory(category, plot, playfield);
        const preferredX = zone.x0 + Math.floor((zone.x1 - zone.x0) * 0.5);

        let best = null;
        let bestScore = -Infinity;
        // 1차: 지정 zone 안에서 중력 드롭
        const candidates = candidateOriginsForZone(item, zone, pieceWidth, pieceDepth, preferredX);
        for (const c of candidates) {
          const y = dropYForPiece(c.x, c.z, cells, playfield);
          if (y > maxY + 4) continue; // 너무 높이 쌓이면 포기
          const origin = { x: c.x, y, z: c.z };
          if (collidesAt(origin, cells, playfield, plot, depthDim)) continue;
          const score = scoreCandidate(origin, item, cells, playfield, plot);
          if (score > bestScore) { bestScore = score; best = origin; }
        }

        // 2차 fallback: 다른 sub-zone (패널티 -2) — 드롭 기반
        if (!best) {
          const fallbackZones = ["foundation", "core", "wingLeft", "wingRight", "cap"]
            .filter(n => n !== zoneName)
            .map(n => subPlots[n])
            .filter(Boolean);
          for (const fz of fallbackZones) {
            const preferredXF = fz.x0 + Math.floor((fz.x1 - fz.x0) * 0.5);
            const fbCandidates = candidateOriginsForZone(item, fz, pieceWidth, pieceDepth, preferredXF);
            for (const c of fbCandidates) {
              const y = dropYForPiece(c.x, c.z, cells, playfield);
              if (y > maxY + 4) continue;
              const origin = { x: c.x, y, z: c.z };
              if (collidesAt(origin, cells, playfield, plot, depthDim)) continue;
              const score = scoreCandidate(origin, item, cells, playfield, plot) - 2;
              if (score > bestScore) { bestScore = score; best = origin; }
            }
            if (best) break;
          }
        }

        // 3차 fallback: plot 전체 드롭
        if (!best) {
          let minY = Infinity;
          for (let x = plot.x0; x <= plot.x1 - pieceWidth + 1; x++) {
            for (let z = plot.z0; z <= plot.z1 - pieceDepth + 1; z++) {
              const y = dropYForPiece(x, z, cells, playfield);
              const origin = { x, y, z };
              if (collidesAt(origin, cells, playfield, plot, depthDim)) continue;
              if (y < minY) { minY = y; best = origin; }
            }
          }
        }
        // 4차 fallback — zone 중심으로 강제 드롭 (이전엔 plot.x0 → 좌측 폭주 원인)
        if (!best) {
          const fallbackX = zone.x0 + Math.floor((zone.x1 - zone.x0) * 0.5);
          const fallbackZ = zone.z0 + Math.floor((zone.z1 - zone.z0) * 0.5);
          const y = dropYForPiece(fallbackX, fallbackZ, cells, playfield);
          best = { x: fallbackX, y, z: fallbackZ };
        }

        commitCells(best, cells, playfield);
        // 모든 core 카운트 (대표/비대표 포함) — currentCoreCount가 정확히 증가해야 다음 판단 정합
        if (roleToBuildingCategory(item.role) === "core") {
          playfield._coreCount.set(sameFileCore, currentCoreCount + 1);
        }
        return {
          piece, rotation: orientation,
          cells, offsetX: best.x, offsetZ: best.z, dropY: best.y, overhang: 0,
        };
      }

      // 3D Polycube placement (legacy/fallback) — XZ section 안에서 Y로 중력 drop
      // playfield = { cells: Set("x,y,z"), profile: Map("x,z" → top y) }
      function placeOnPlayfield(item, playfield, files, branchFlip, order, fileWidth, depthDim) {
        const fileIdx = Math.max(0, files.indexOf(item.file || "unknown"));
        const sectionStart = fileIdx * fileWidth;
        const localTarget = roleTargetX(item.role, order, branchFlip, fileWidth);
        const target = sectionStart + Math.min(fileWidth - 1, localTarget);

        const piece = roleToPiece(item.role);
        const baseCells = POLYCUBE_V1[piece].cells.default;
        // Stack along Y by LOC → bigger function = bigger block
        // 1~8줄 = 1층, 9~16줄 = 2층, ... 최대 12층
        const loc = Math.max(1, item.loc || 1);
        const stacks = Math.max(1, Math.min(12, Math.ceil(loc / 8)));
        const cells = [];
        for (let s = 0; s < stacks; s++) {
          for (const [cx, cy, cz] of baseCells) {
            cells.push([cx, cy + s, cz]);
          }
        }
        const pieceWidth = Math.max(...cells.map(c => c[0])) + 1;
        const pieceDepth = Math.max(...cells.map(c => c[2])) + 1;
        const rot = "default";
        const maxOffsetInFile = Math.max(sectionStart, sectionStart + fileWidth - pieceWidth);
        const offsetX = Math.max(sectionStart, Math.min(maxOffsetInFile, target));

        // Z 시작점: 파일 그룹 내 piece가 depthDim 안에 들어가게 clamp
        const D = Math.max(1, depthDim || 4);
        const offsetZ = Math.max(0, Math.min(D - pieceDepth, item.depth || 0));

        // dropY 계산 (3D collision drop) — 각 (x,z) col에서 위에서 떨어짐
        let dropY = 0;
        for (const [cx, cy, cz] of cells) {
          const col = (cx + offsetX) + "," + (cz + offsetZ);
          const top = playfield.profile.get(col);
          const req = (top === undefined ? -1 : top) + 1 - cy;
          if (req > dropY) dropY = req;
        }
        // place — 3D cells Set 채우기 + 각 (x,z) col profile 갱신
        for (const [cx, cy, cz] of cells) {
          const ax = cx + offsetX;
          const ay = dropY + cy;
          const az = cz + offsetZ;
          playfield.cells.add(ax + "," + ay + "," + az);
          const colKey = ax + "," + az;
          const curr = playfield.profile.get(colKey);
          if (curr === undefined || curr < ay) playfield.profile.set(colKey, ay);
        }
        // overhang (각 cell의 바로 아래가 비어있고 같은 piece에도 없으면)
        let overhang = 0;
        for (const [cx, cy, cz] of cells) {
          const ax = cx + offsetX;
          const ay = dropY + cy;
          const az = cz + offsetZ;
          if (ay === 0) continue;
          const sameBlockBelow = cells.some(o => o[0] === cx && o[1] === cy - 1 && o[2] === cz);
          if (sameBlockBelow) continue;
          const belowKey = ax + "," + (ay - 1) + "," + az;
          if (!playfield.cells.has(belowKey)) overhang += 1;
        }
        return { rotation: rot, cells, offsetX, offsetZ, dropY, overhang, piece };
      }

      // Line clear 카운트 — 한 row의 모든 column에 cell 있으면 카운트++
      function countClearedLines(playfield, playfieldWidth) {
        // row별 cell 수 집계
        const rowCount = new Map();
        playfield.cells.forEach(key => {
          const [_c, r] = key.split(",").map(Number);
          rowCount.set(r, (rowCount.get(r) || 0) + 1);
        });
        let cleared = 0;
        rowCount.forEach((count, _row) => {
          if (count >= playfieldWidth) cleared += 1;
        });
        return cleared;
      }

      // Legacy compat — kind 글자(I/O/T/S/Z/J/L) → cells
      function tetrominoOffsets(kind) {
        const k = (kind || "").toString().toLowerCase();
        const def = POLYCUBE_V1[k] || POLYCUBE_V1.o;
        return def.cells.default;
      }

      // ---- 공유 Geometry 캐시 (모든 블록이 같은 cube 모양 사용 → GC 부하 감소) ----
      const _SHARED_GEO = { box: null, edges: null };
      function getCubeGeo() {
        // 0.98 SCALE = 셀 사이 미세 분리 (인접 cube 경계 보이게)
        if (!_SHARED_GEO.box) _SHARED_GEO.box = new THREE.BoxGeometry(0.98 * SCALE, 0.98 * SCALE, 0.98 * SCALE);
        return _SHARED_GEO.box;
      }
      function getEdgesGeo() {
        if (!_SHARED_GEO.edges) _SHARED_GEO.edges = new THREE.EdgesGeometry(getCubeGeo());
        return _SHARED_GEO.edges;
      }
      // 라벨 텍스처도 동일 텍스트면 캐싱
      const _LABEL_TEX_CACHE = new Map();

      // LOC 라벨 sprite (캔버스 텍스처 → 3D 공간에 떠있는 텍스트)
      // Stamp block surface — large LOC number on each cube face
      function makeLocFaceTexture(loc) {
        const cacheKey = `face|${loc}`;
        let tex = _LABEL_TEX_CACHE.get(cacheKey);
        if (tex) return tex;
        const canvas = document.createElement("canvas");
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext("2d");
        // 베이스 — 중간 밝기 (material color가 이걸 곱함)
        ctx.fillStyle = "#808080";
        ctx.fillRect(0, 0, 256, 256);
        // 가장자리 어둡게 (블록 경계감)
        ctx.strokeStyle = "#303030";
        ctx.lineWidth = 12;
        ctx.strokeRect(0, 0, 256, 256);
        // 중앙 큰 숫자 — 흰색 (piece color를 그대로 노출)
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const n = String(loc || 1);
        const fontSize = n.length <= 2 ? 140 : n.length === 3 ? 110 : 90;
        ctx.font = `bold ${fontSize}px ui-sans-serif, system-ui, -apple-system`;
        ctx.fillText(n, 128, 138);
        tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;
        _LABEL_TEX_CACHE.set(cacheKey, tex);
        return tex;
      }

      // (구) 블록 위 라벨 — 더 이상 사용 안 함
      function makeBlockLabelSprite(piece, role, loc, accent) {
        const cacheKey = `block|${piece}|${role}|${loc}|${accent || "d"}`;
        let tex = _LABEL_TEX_CACHE.get(cacheKey);
        if (!tex) {
          const canvas = document.createElement("canvas");
          canvas.width = 256; canvas.height = 110;
          const ctx = canvas.getContext("2d");
          // 배경
          ctx.fillStyle = "rgba(15,23,42,0.92)";
          const r = 14;
          if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(2, 2, 252, 106, r); ctx.fill(); }
          else { ctx.fillRect(2, 2, 252, 106); }
          ctx.strokeStyle = accent || "#a5b4fc";
          ctx.lineWidth = 2.5;
          if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(2, 2, 252, 106, r); ctx.stroke(); }
          // 상단 small: piece · role
          ctx.fillStyle = "rgba(229,231,235,0.85)";
          ctx.font = "22px ui-sans-serif, system-ui, -apple-system";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(`${piece} · ${role}`, 128, 28);
          // 하단 BIG: LOC 숫자 강조
          ctx.fillStyle = accent || "#fcd34d";
          ctx.font = "bold 56px ui-sans-serif, system-ui, -apple-system";
          ctx.fillText(`${loc}`, 110, 75);
          // "lines" 작게 옆에
          ctx.fillStyle = "rgba(229,231,235,0.7)";
          ctx.font = "20px ui-sans-serif";
          ctx.textAlign = "left";
          ctx.fillText("lines", 158, 80);
          tex = new THREE.CanvasTexture(canvas);
          tex.needsUpdate = true;
          _LABEL_TEX_CACHE.set(cacheKey, tex);
        }
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
        sprite.scale.set(2.6, 1.1, 1);
        return sprite;
      }

      function makeLabelSprite(text, accent) {
        const cacheKey = `${text}|${accent || "default"}`;
        let tex = _LABEL_TEX_CACHE.get(cacheKey);
        if (!tex) {
          const canvas = document.createElement("canvas");
          canvas.width = 384; canvas.height = 64;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "rgba(15,23,42,0.86)";
          ctx.beginPath();
          const r = 18;
          ctx.roundRect ? ctx.roundRect(2, 2, 380, 60, r) : ctx.rect(2, 2, 380, 60);
          ctx.fill();
          ctx.strokeStyle = accent || "#a5b4fc";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = accent || "#a5b4fc";
          ctx.font = "bold 30px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(text, 192, 36);
          tex = new THREE.CanvasTexture(canvas);
          tex.needsUpdate = true;
          _LABEL_TEX_CACHE.set(cacheKey, tex);
        }
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
        sprite.scale.set(3.6, 0.6, 1);
        return sprite;
      }

      function createTetrominoGroup(block, themeId) {
        const group = new THREE.Group();
        group.name = block.id;
        group.userData.block = block;
        // MATERIAL: piece 타입별 색 (file 아님!) + theme metalness/roughness
        const mat = inferMaterial(block.file, themeId);
        const rawPiece = block._piece || block.kind || "slab";
        const piece = (rawPiece + "").toLowerCase();
        // Each block needs its own color — Polycube piece decides color
        const pieceColor = POLYCUBE_COLORS[piece] || mat.color;
        const color = new THREE.Color(pieceColor);
        // 채도 부스트 — lightness 유지하고 saturation만 +30%
        const _hsl = { h: 0, s: 0, l: 0 };
        color.getHSL(_hsl);
        color.setHSL(_hsl.h, Math.min(1, _hsl.s * 1.3), _hsl.l);
        // 같은 piece = 같은 색. emissive는 piece 색 자체. 형광 방지로 강도 낮춤.
        const statusEmissiveColor = "#" + color.getHexString();
        const baseEmissive = block.status === "critical" ? 0.30
          : block.status === "watch" ? 0.22
          : block.status === "ghost" ? 0.12
          : block.status === "rejected" ? 0.28
          : 0.15; // stable: 부드러운 자기 색 글로우
        const emissiveIntensity = baseEmissive;
        // face 텍스처 제거 — loc는 블록당 1개 라벨 카드로 표시
        const patternMap = mat.hasPattern
          ? getSemanticPatternTexture(pieceColor, mat.patternDensity || 0.5)
          : null;
        // stable/watch/critical are always opaque. only ghost/rejected slightly transparent
        const opacity = block.status === "ghost" ? 0.42
          : block.status === "rejected" ? 0.78
          : 1.0;
        // overhang = role transition signal → 주황 edge
        // tetr.io: 밝은 백색 edge로 piece 형태 강조
        const hasOverhang = (block.overhang || 0) > 0;
        const edgeColor = hasOverhang ? 0xfb923c : 0xffffff;
        const edgeOpacity = hasOverhang ? 0.95 : 0.85;
        const offsetsToRender = block._cells && block._cells.length ? block._cells : tetrominoOffsets(block.kind);
        // 블록 footprint top 좌표 (라벨 위치용)
        const topY = offsetsToRender.reduce((m, o) => Math.max(m, o[1]), 0);
        const cxAvg = offsetsToRender.reduce((s, o) => s + o[0], 0) / offsetsToRender.length;
        offsetsToRender.forEach(([x, y, z]) => {
          const material = new THREE.MeshStandardMaterial({
            color: color.clone(),
            transparent: opacity < 0.99,
            opacity,
            emissive: new THREE.Color(statusEmissiveColor),
            emissiveIntensity,
            roughness: 0.42,
            metalness: 0.12,
            map: patternMap || null,
          });
          // 공유 geometry 사용 (블록마다 신규 생성 X) — material만 인스턴스
          const geo = getCubeGeo();
          const mesh = new THREE.Mesh(geo, material);
          mesh.castShadow = true; mesh.receiveShadow = true;
          mesh.position.set(x * SCALE, y * SCALE, z * SCALE);
          mesh.userData.block = block;
          mesh.userData.disposable = true; // material만 dispose
          group.add(mesh);
          const edge = new THREE.LineSegments(
            getEdgesGeo(),
            new THREE.LineBasicMaterial({
              color: edgeColor, transparent: true, opacity: edgeOpacity,
            })
          );
          edge.position.copy(mesh.position);
          edge.userData.block = block;
          edge.userData.disposable = true;
          group.add(edge);
        });
        // 라벨 카드 — 블록당 1개 (piece · role + 큰 loc 숫자)
        const loc = block.loc || (block.lineEnd && block.lineStart ? Math.max(1, block.lineEnd - block.lineStart + 1) : 1);
        const roleShort = (block.role || "").slice(0, 8);
        const accentColor = hasOverhang ? "#fb923c"
          : `#${pieceColor.toString(16).padStart(6, "0")}`;
        const sprite = makeBlockLabelSprite(piece, roleShort, loc, accentColor);
        sprite.position.set(cxAvg * SCALE, (topY + 1.4) * SCALE, 0);
        if (sprite) group.add(sprite);
        // rotation은 이제 orientation string ("default"/"rot90"/etc) — 회전은 cells에 이미 반영됨
        // group.rotation은 항상 0 (NaN 방지)
        group.rotation.y = 0;
        return group;
      }

      // Modules 계산 — 서로 닿거나 1칸 이내 거리면 같은 덩어리 (연결 성분)
      function blockUnitRange(b) {
        const cells = b._cells && b._cells.length ? b._cells : [[0, 0, 0]];
        const bx = (b.x || 0) / SCALE;
        const by = (b.y || 0) / SCALE;
        const bz = (b.z || 0) / SCALE;
        return {
          x0: bx + Math.min(...cells.map(c => c[0])),
          x1: bx + Math.max(...cells.map(c => c[0])),
          y0: by + Math.min(...cells.map(c => c[1])),
          y1: by + Math.max(...cells.map(c => c[1])),
          z0: bz + Math.min(...cells.map(c => c[2])),
          z1: bz + Math.max(...cells.map(c => c[2])),
        };
      }
      function blocksTouch(a, b) {
        const ar = blockUnitRange(a);
        const br = blockUnitRange(b);
        // 1칸 이내 gap까지 같은 덩어리로 취급
        const xOverlap = ar.x0 <= br.x1 + 1 && ar.x1 + 1 >= br.x0;
        const yOverlap = ar.y0 <= br.y1 + 1 && ar.y1 + 1 >= br.y0;
        const zOverlap = ar.z0 <= br.z1 + 1 && ar.z1 + 1 >= br.z0;
        return xOverlap && yOverlap && zOverlap;
      }
      // 연결 성분 수 — minSize 이상의 덩어리만 카운트 (잡음 블록 제외)
      function computeModules(blocks, minSize) {
        if (!blocks || !blocks.length) return 0;
        const min = minSize == null ? 3 : minSize;
        const visited = new Set();
        let groups = 0;
        for (let i = 0; i < blocks.length; i++) {
          if (visited.has(i)) continue;
          const stack = [i];
          visited.add(i);
          let size = 0;
          while (stack.length) {
            const cur = stack.pop();
            size++;
            for (let j = 0; j < blocks.length; j++) {
              if (visited.has(j)) continue;
              if (blocksTouch(blocks[cur], blocks[j])) {
                visited.add(j);
                stack.push(j);
              }
            }
          }
          if (size >= min) groups++;
        }
        return groups;
      }

      // ---------- BuildReplayViewport (3d_9 기반) ----------
      function BuildReplayViewport({ strategies, selected, onPickStrategy, onHoverBlock, externalTrigger, onReady, themeId, advanced = false, codeLineCount = 0 }) {
        const mountRef = useRef(null);
        const stateRef = useRef({});
        const wrapperRef = useRef(null);
        const [isPlaying, setIsPlaying] = useState(false);
        const [speed, setSpeed] = useState(1);
        const [refreshTick, setRefreshTick] = useState(0);
        const [isFullscreen, setIsFullscreen] = useState(false);

        // Native Fullscreen API — browser chrome 완전 숨김 (F11 효과)
        const toggleFullscreen = () => {
          const el = wrapperRef.current;
          if (!el) return;
          const isFs = !!(
            document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.mozFullScreenElement ||
            document.msFullscreenElement
          );
          if (!isFs) {
            const req = el.requestFullscreen ||
                        el.webkitRequestFullscreen ||
                        el.mozRequestFullScreen ||
                        el.msRequestFullscreen;
            if (req) req.call(el).catch(() => {});
          } else {
            const exit = document.exitFullscreen ||
                         document.webkitExitFullscreen ||
                         document.mozCancelFullScreen ||
                         document.msExitFullscreen;
            if (exit) exit.call(document).catch(() => {});
          }
        };

        // Fullscreen 상태 동기화 — 브라우저 이벤트로 React state 갱신
        useEffect(() => {
          const onFsChange = () => {
            const isFs = !!(
              document.fullscreenElement ||
              document.webkitFullscreenElement ||
              document.mozFullScreenElement ||
              document.msFullscreenElement
            );
            setIsFullscreen(isFs);
            // Three.js 리사이즈 강제 (브라우저가 element 크기 변경 직후)
            setTimeout(() => window.dispatchEvent(new Event("resize")), 50);
            setTimeout(() => window.dispatchEvent(new Event("resize")), 250);
          };
          document.addEventListener("fullscreenchange", onFsChange);
          document.addEventListener("webkitfullscreenchange", onFsChange);
          document.addEventListener("mozfullscreenchange", onFsChange);
          document.addEventListener("MSFullscreenChange", onFsChange);
          return () => {
            document.removeEventListener("fullscreenchange", onFsChange);
            document.removeEventListener("webkitfullscreenchange", onFsChange);
            document.removeEventListener("mozfullscreenchange", onFsChange);
            document.removeEventListener("MSFullscreenChange", onFsChange);
          };
        }, []);

        // F 키 단축키 — input/textarea 입력 중 아닐 때만
        useEffect(() => {
          const onKey = (e) => {
            if (e.key === "f" && !e.metaKey && !e.ctrlKey && !e.altKey) {
              const tag = (document.activeElement?.tagName || "").toLowerCase();
              if (tag === "input" || tag === "textarea") return;
              e.preventDefault();
              toggleFullscreen();
            }
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, []);

        const replayPack = useMemo(
          () => buildReplayFramesV2(selected?.blocks || []),
          [selected]
        );
        const counts = useMemo(() => ({
          locks: replayPack.frames.filter(f => f.action === "lock").length,
          ghosts: replayPack.frames.filter(f => f.action === "ghost_lock").length,
          rejects: replayPack.frames.filter(f => f.action === "reject").length,
        }), [replayPack]);

        // HUD stats — playfield 누적 정보
        const stats = useMemo(() => {
          const blocks = selected?.blocks || [];
          const total = blocks.length;
          const tallest = blocks.length
            ? Math.max(...blocks.map(b => (b.y || 0) / SCALE + Math.max(0, ...(b._cells || [[0,0]]).map(c => c[1]))))
            : 0;
          const filesCount = blocks[0]?._filesCount || new Set(blocks.map(b => b.file || "unknown")).size;
          const cleared = blocks[0]?._linesCleared || 0;
          const overhangSum = blocks.reduce((sum, b) => sum + (b.overhang || 0), 0);
          // SPEC v1: 평균 블록 체형 (W*H)
          const avgSize = blocks.length
            ? blocks.reduce((s, b) => s + (b.widthUnits || 1) * (b.heightUnits || 1), 0) / blocks.length
            : 0;
          const bossCount = blocks.filter(b => (b.heightUnits || 1) >= 3 || (b.widthUnits || 1) >= 3).length;
          // Z axis: layer band count
          const layers = blocks.reduce((acc, b) => {
            const name = b._layerName || "Service";
            acc[name] = (acc[name] || 0) + 1;
            return acc;
          }, {});
          const layerStr = Object.entries(layers)
            .map(([k, v]) => `${k.charAt(0)}${v}`)
            .join("·");
          // 재질 카운트 (frame/glass/interior...)
          const materials = blocks.reduce((acc, b) => {
            const k = fileToKind(b.file);
            acc[k] = (acc[k] || 0) + 1;
            return acc;
          }, {});
          const dominantMat = Object.entries(materials).sort((a, b) => b[1] - a[1])[0]?.[0] || "—";
          // Code Layer: S/Sm/P distribution + average weight
          const arch = blocks.reduce((acc, b) => {
            const k = b._archLayer || architectureLayer(b.file);
            acc[k] = (acc[k] || 0) + 1;
            return acc;
          }, {});
          const archStr = `S${arch.structural || 0}·Sm${arch.semantic || 0}·P${arch.presentation || 0}`;
          // Average weight (weight distribution)
          const wAvg = blocks.reduce((acc, b) => {
            const w = b._archWeights || { s: 1, sm: 0, pr: 0 };
            acc.s += w.s; acc.sm += w.sm; acc.pr += w.pr;
            return acc;
          }, { s: 0, sm: 0, pr: 0 });
          const wTotal = wAvg.s + wAvg.sm + wAvg.pr || 1;
          const wPct = {
            s: Math.round(wAvg.s / wTotal * 100),
            sm: Math.round(wAvg.sm / wTotal * 100),
            pr: Math.round(wAvg.pr / wTotal * 100),
          };
          const wStr = `${wPct.s}/${wPct.sm}/${wPct.pr}`;
          // Lines: 실제 paste한 코드의 라인 수 (codeLineCount), 없으면 max lineEnd로 fallback
          const maxLineEnd = blocks.reduce((m, b) => Math.max(m, b.lineEnd || 0), 0);
          const realLines = codeLineCount > 0 ? codeLineCount : maxLineEnd;
          // Polycube piece별 카운트 + 라인합계 (i/o/t/s/z/j/l)
          const pieceCounts = {};
          const pieceLocSums = {};
          blocks.forEach(b => {
            const p = (b._piece || b.kind || "o").toString().toLowerCase();
            pieceCounts[p] = (pieceCounts[p] || 0) + 1;
            pieceLocSums[p] = (pieceLocSums[p] || 0) + (b.loc || 0);
          });
          // 블록별 loc 총합 (실제 시각화된 코드 라인 총합)
          const blocksLocSum = blocks.reduce((s, b) => s + (b.loc || 0), 0);
          // Modules = connected building cluster count (was: line clear count)
          const moduleCount = computeModules(blocks, 3);
          return {
            total,
            tallest: Math.round(tallest + 1),
            filesCount,
            cleared,
            lines: realLines,
            overhangSum,
            modules: moduleCount,
            avgSize: avgSize.toFixed(1),
            boss: bossCount,
            layerStr,
            dominantMat: MATERIAL_KIND_NAMES[dominantMat] || dominantMat,
            archStr,
            wStr,
            pieceCounts,
            pieceLocSums,
            blocksLocSum,
          };
        }, [selected, codeLineCount]);

        // 세션 타이머 — DOM ref 직접 갱신으로 React 재렌더 우회
        const sessionStartRef = useRef(Date.now());
        const timerRef = useRef(null);
        useEffect(() => {
          const fmt = () => {
            const sec = Math.floor((Date.now() - sessionStartRef.current) / 1000);
            const m = String(Math.floor(sec / 60)).padStart(2, "0");
            const s = String(sec % 60).padStart(2, "0");
            if (timerRef.current) timerRef.current.textContent = `${m}:${s}`;
          };
          fmt();
          const id = setInterval(fmt, 1000);
          return () => clearInterval(id);
        }, []);

        // report counts upward
        useEffect(() => {
          if (onReady) onReady({ counts, totalBlocks: selected?.blocks?.length || 0 });
        }, [counts, selected]);

        // init scene once
        useEffect(() => {
          const mount = mountRef.current;
          if (!mount) return;
          const width = mount.clientWidth;
          const height = 620;
          const scene = new THREE.Scene();
          // 어두운 navy 배경 (이전 톤 복원)
          scene.background = new THREE.Color(0x0b1220);
          // fog 제거 — 멀리 줌아웃해도 흐려지지 않게
          const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
          camera.position.set(18 * SCALE, 22 * SCALE, 26 * SCALE);
          camera.lookAt(0, 10 * SCALE, 0);
          const renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setSize(width, height);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.shadowMap.enabled = true;
          mount.appendChild(renderer.domElement);
          let controls = null;
          if (window.THREE && typeof THREE.OrbitControls === "function") {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.enablePan = true;
            controls.enableRotate = true;
            controls.enableZoom = true;
            controls.screenSpacePanning = true;
            controls.target.set(0, 8 * SCALE, 0);
            // 자유 3D 회전 — polar angle 제한 해제 (위·아래·뒤집기 가능)
            controls.minPolarAngle = 0;
            controls.maxPolarAngle = Math.PI;
            controls.minDistance = 3;
            controls.maxDistance = 200;
            controls.zoomSpeed = 1.1;
            controls.rotateSpeed = 0.9;
            controls.panSpeed = 0.9;
          }
          // 조명 진하게 — ambient 약간 올리고 directional 강화 + rim light 추가
          scene.add(new THREE.AmbientLight(0xffffff, 0.6));
          const dir = new THREE.DirectionalLight(0xffffff, 1.6);
          dir.position.set(12, 22, 10);
          dir.castShadow = true;
          scene.add(dir);
          const rim = new THREE.DirectionalLight(0x818cf8, 0.55);
          rim.position.set(-14, 10, -6);
          scene.add(rim);
          // Floor — deep slate (original)
          const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.92, metalness: 0.08 })
          );
          floor.rotation.x = -Math.PI / 2;
          floor.position.y = -0.49 * SCALE;
          floor.receiveShadow = true;
          scene.add(floor);
          const grid = new THREE.GridHelper(60, 30, 0x334155, 0x1e293b);
          grid.position.y = -0.485 * SCALE;
          scene.add(grid);
          const group = new THREE.Group();
          scene.add(group);
          stateRef.current = { scene, camera, renderer, controls, blocksGroup: group };
          let raf = 0;
          const animate = () => {
            if (controls) controls.update();
            else {
              // fallback auto-rotate
              const t = performance.now() * 0.00015;
              camera.position.x = 14 * Math.cos(t);
              camera.position.z = 18 * Math.sin(t);
              camera.position.y = 16;
              camera.lookAt(0, 5, 0);
            }
            renderer.render(scene, camera);
            raf = requestAnimationFrame(animate);
          };
          animate();
          const onResize = () => {
            const w = mount.clientWidth || 1;
            const h = mount.clientHeight || height; // fullscreen 시 mount가 100% 높이를 가짐
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
          };
          window.addEventListener("resize", onResize);
          return () => {
            cancelAnimationFrame(raf);
            window.removeEventListener("resize", onResize);
            if (controls) controls.dispose();
            renderer.dispose();
            if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
          };
        }, []);

        // theme 변경 시 background 갱신
        useEffect(() => {
          const s = stateRef.current;
          if (!s.scene) return;
          const t = THEMES[themeId] || THEMES.classic;
          s.scene.background = new THREE.Color(t.background);
          if (s.scene.fog) s.scene.fog.color = new THREE.Color(t.background);
        }, [themeId]);

        // sync blocks
        useEffect(() => {
          const s = stateRef.current;
          if (!s.blocksGroup) return;
          while (s.blocksGroup.children.length) {
            const c = s.blocksGroup.children.pop();
            c.traverse && c.traverse(o => {
              if (o.geometry && !o.userData?.disposable && o.geometry !== _SHARED_GEO.box && o.geometry !== _SHARED_GEO.edges) {
                o.geometry.dispose();
              }
              if (o.material) o.material.dispose();
            });
          }
          (selected.blocks || []).forEach(block => {
            const bg = createTetrominoGroup(block, themeId);
            bg.position.set(block.x, block.y, block.z);
            // 빈 씬에서 시작 — 애니메이션이 spawn 타이밍에 맞춰 보이게 함
            bg.visible = false;
            s.blocksGroup.add(bg);
          });
          // file 구분선 (얇은 panel) — 동적 fileWidth 기준
          const meta = selected.blocks?.[0] || {};
          const filesCount = meta._filesCount || 1;
          const fileWidth = meta._fileWidth || PLAYFIELD_WIDTH;
          const playfieldWidth = meta._playfieldWidth || PLAYFIELD_WIDTH;
          const center = (playfieldWidth - 1) / 2;
          for (let f = 1; f < filesCount; f += 1) {
            const xCol = f * fileWidth - 0.5;
            const dividerX = (xCol - center) * SCALE;
            const divider = new THREE.Mesh(
              new THREE.BoxGeometry(0.08, 36 * SCALE, 0.08),
              new THREE.MeshBasicMaterial({ color: 0x64748b, transparent: true, opacity: 0.45 })
            );
            divider.position.set(dividerX, 18 * SCALE, 0);
            s.blocksGroup.add(divider);
          }
          // playfield 좌우 외곽 wall (살짝)
          const wallHeight = 36 * SCALE;
          [-(center + 0.5) * SCALE, (center + 0.5) * SCALE].forEach(wx => {
            const wall = new THREE.Mesh(
              new THREE.BoxGeometry(0.12, wallHeight, 0.12),
              new THREE.MeshBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.55 })
            );
            wall.position.set(wx, wallHeight / 2 - 0.5 * SCALE, 0);
            s.blocksGroup.add(wall);
          });
        }, [strategies, selected, refreshTick, themeId]);

        // hover + click
        useEffect(() => {
          const s = stateRef.current;
          if (!s.renderer) return;
          const raycaster = new THREE.Raycaster();
          const mouse = new THREE.Vector2();
          const pick = (ev) => {
            const rect = s.renderer.domElement.getBoundingClientRect();
            mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, s.camera);
            const hits = raycaster.intersectObjects(s.scene.children, true);
            return hits.find(h => h.object.userData && h.object.userData.block);
          };
          const handleMove = (ev) => {
            const hit = pick(ev);
            if (hit) {
              const block = hit.object.userData.block;
              onHoverBlock && onHoverBlock({ block, fit: replayPack.meta[block.id]?.finalFit });
            } else {
              onHoverBlock && onHoverBlock(null);
            }
          };
          const handleClick = (ev) => {
            const hit = pick(ev);
            if (hit && onPickStrategy) onPickStrategy(hit.object.userData.block.strategyId);
          };
          s.renderer.domElement.addEventListener("pointermove", handleMove);
          s.renderer.domElement.addEventListener("click", handleClick);
          return () => {
            if (s.renderer && s.renderer.domElement) {
              s.renderer.domElement.removeEventListener("pointermove", handleMove);
              s.renderer.domElement.removeEventListener("click", handleClick);
            }
          };
        }, [replayPack, onHoverBlock, onPickStrategy]);

        // external trigger → play
        useEffect(() => {
          if (externalTrigger && externalTrigger > 0) {
            setRefreshTick(v => v + 1);
            setIsPlaying(true);
          }
        }, [externalTrigger]);

        // replay animation — 빈 씬 → 블록 하나씩 위에서 떨어져 적층
        useEffect(() => {
          if (!isPlaying) return;
          const s = stateRef.current;
          if (!s.blocksGroup) return;
          const start = performance.now();
          const SPAWN_LIFT = 16 * SCALE; // 떨어지는 높이 (충분히 위에서)
          const originals = new Map();
          const frameIdx = new Map();
          // 시작 시 모든 블록 숨김 — 빈 씬에서 출발
          s.blocksGroup.children.forEach(child => {
            const block = child.userData.block;
            if (!block) return;
            originals.set(child.name, child.position.clone());
            const spawn = replayPack.frames.find(f => f.blockId === child.name && f.action === "spawn");
            const settle = replayPack.frames.find(f => f.blockId === child.name && ["lock", "ghost_lock", "reject"].includes(f.action));
            frameIdx.set(child.name, { spawn, settle });
            child.visible = false;
          });
          // 강제 종료 시 모든 블록 최종 상태로 복원
          const snapAllToFinal = () => {
            s.blocksGroup.children.forEach(child => {
              const init = originals.get(child.name);
              if (!init) return;
              child.position.copy(init);
              child.visible = true;
            });
          };
          let raf = 0;
          let stopped = false;
          const tick = () => {
            if (!s.blocksGroup || stopped) return;
            const elapsed = (performance.now() - start) * speed;
            s.blocksGroup.children.forEach(child => {
              const block = child.userData.block;
              if (!block || block.strategyId !== selected.id) return;
              const initial = originals.get(child.name);
              if (!initial) return;
              const f = frameIdx.get(child.name);
              if (!f || !f.spawn) {
                child.position.copy(initial);
                child.visible = true;
                return;
              }
              const { spawn, settle } = f;
              // 1) spawn 전 = 숨김 (빈 씬)
              if (elapsed < spawn.timestamp) {
                child.visible = false;
                return;
              }
              // 2) settle 이후 = 최종 위치 + 보임
              if (settle && elapsed >= settle.timestamp) {
                child.visible = true;
                child.position.copy(initial);
                return;
              }
              // 3) spawn ~ settle = 보임 + 위에서 떨어지는 ease
              child.visible = true;
              const settleT = settle ? settle.timestamp : (spawn.timestamp + 280);
              const total = Math.max(1, settleT - spawn.timestamp);
              const t = Math.max(0, Math.min(1, (elapsed - spawn.timestamp) / total));
              const ease = 1 - Math.pow(1 - t, 3);
              const dropY = initial.y + SPAWN_LIFT * (1 - ease);
              child.position.set(initial.x, dropY, initial.z);
            });
            const last = replayPack.frames[replayPack.frames.length - 1]?.timestamp ?? 0;
            const done = elapsed > last + 400;
            if (!done) raf = requestAnimationFrame(tick);
            else { snapAllToFinal(); setIsPlaying(false); }
          };
          raf = requestAnimationFrame(tick);
          return () => {
            stopped = true;
            cancelAnimationFrame(raf);
            snapAllToFinal();
          };
        }, [isPlaying, replayPack, selected, speed]);

        return (
          <div className="space-y-3">
            <div
              ref={wrapperRef}
              className={cn(
                "relative",
                isFullscreen && "bg-slate-950 p-3 sm:p-6 flex items-center justify-center"
              )}
              style={isFullscreen ? { width: "100vw", height: "100vh" } : undefined}
            >
              <div
                ref={mountRef}
                className={cn(
                  "w-full overflow-hidden border bg-white",
                  isFullscreen ? "h-full rounded-2xl border-slate-800" : "rounded-3xl border-slate-200"
                )}
                style={isFullscreen ? undefined : { height: 880 }}
              />

              {/* Fullscreen toggle (top-right) */}
              <button
                type="button"
                onClick={toggleFullscreen}
                title={isFullscreen ? "Exit fullscreen (Esc / F)" : "Fullscreen for demo (F)"}
                className={cn(
                  "absolute z-10 inline-flex items-center gap-1.5 rounded-lg border bg-slate-950/85 px-2.5 py-1.5 text-[11px] font-medium text-slate-100 shadow-lg backdrop-blur transition hover:bg-slate-900",
                  isFullscreen ? "top-5 right-5 border-slate-700" : "top-3 right-3 border-slate-700"
                )}
              >
                {isFullscreen ? (
                  <>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v4a1 1 0 0 1-1 1H3" /><path d="M21 8h-4a1 1 0 0 1-1-1V3" /><path d="M3 16h4a1 1 0 0 1 1 1v4" /><path d="M16 21v-4a1 1 0 0 1 1-1h4" /></svg>
                    Exit (Esc)
                  </>
                ) : (
                  <>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2" /><path d="M17 3h2a2 2 0 0 1 2 2v2" /><path d="M21 17v2a2 2 0 0 1-2 2h-2" /><path d="M7 21H5a2 2 0 0 1-2-2v-2" /></svg>
                    Fullscreen
                  </>
                )}
              </button>

              {/* HUD overlay — v0.1 bottom strip: Lines 강조 · 나머지 보조 */}
              <div className={cn(
                "pointer-events-none absolute inset-x-3 flex flex-wrap items-center justify-center gap-5 rounded-2xl bg-slate-950/90 px-5 py-3 text-[12px] text-slate-100 shadow-2xl backdrop-blur",
                isFullscreen ? "bottom-8" : "bottom-3"
              )}>
                <div className="flex items-baseline gap-2">
                  <span className="text-slate-400 text-[11px] uppercase tracking-wider">Lines</span>
                  <span className="font-mono text-amber-300 font-bold text-3xl leading-none">{stats.lines}</span>
                </div>
                <div className="h-6 w-px bg-slate-700" />
                <div><span className="text-slate-400">Blocks</span> <span className="font-mono text-emerald-300 ml-1.5 text-base">{stats.total}</span></div>
                <div className="h-6 w-px bg-slate-700" />
                <div><span className="text-slate-400">Height</span> <span className="font-mono text-sky-300 ml-1.5 text-base">{stats.tallest}</span></div>
                <div className="h-6 w-px bg-slate-700" />
                <div><span className="text-slate-400">Modules</span> <span className="font-mono text-orange-300 ml-1.5 text-base">{stats.modules}</span></div>
                <div className="h-6 w-px bg-slate-700" />
                <div><span className="text-slate-400">Time</span> <span ref={timerRef} className="font-mono text-slate-200 ml-1.5 text-base">00:00</span></div>
              </div>
              {/* fit summary 작은 카드 (좌하단) — Advanced 전용 (엔진 내부 정보) */}
              {advanced && (
                <div className={cn(
                  "pointer-events-none absolute rounded-xl bg-slate-950/75 px-2.5 py-1.5 text-[10px] text-slate-300 shadow-lg backdrop-blur",
                  isFullscreen ? "left-8 bottom-8" : "left-3 bottom-3"
                )}>
                  <div className="flex items-center gap-2">
                    <span><span className="text-emerald-300">●</span> {counts.locks}</span>
                    <span><span className="text-slate-400">●</span> {counts.ghosts}</span>
                    <span><span className="text-rose-300">●</span> {counts.rejects}</span>
                    {stats.overhangSum > 0 && <span><span className="text-orange-300">●</span> {stats.overhangSum} transitions</span>}
                  </div>
                </div>
              )}

              {/* Fullscreen mode — floating play controls (bottom-center, above HUD) */}
              {isFullscreen && (
                <div className="absolute left-1/2 top-5 -translate-x-1/2 z-10 flex items-center gap-2 rounded-xl bg-slate-950/85 px-3 py-2 text-[11px] text-slate-100 shadow-2xl backdrop-blur border border-slate-700">
                  <button
                    type="button"
                    onClick={() => setIsPlaying(true)}
                    className="inline-flex items-center gap-1 rounded-md bg-emerald-500/90 px-2.5 py-1 font-semibold text-emerald-50 hover:bg-emerald-500"
                  >
                    ▶ Play
                  </button>
                  <button
                    type="button"
                    onClick={() => { setIsPlaying(false); setRefreshTick(v => v + 1); }}
                    className="inline-flex items-center gap-1 rounded-md border border-slate-600 bg-slate-900 px-2.5 py-1 hover:bg-slate-800"
                  >
                    ↻ Reset
                  </button>
                  <span className="ml-1 text-slate-400 text-[10px]">F · Esc</span>
                </div>
              )}
            </div>
            {/* Piece distribution — 7색 카운트 바 + 블록 LOC 합계 */}
            <div className="flex flex-wrap items-center justify-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-xs">
              <div className="flex items-center gap-1.5 pr-3 border-r border-slate-200">
                <span className="text-slate-500">블록 총 라인</span>
                <span className="font-mono text-amber-600 font-bold text-base">{stats.blocksLocSum || 0}</span>
                <span className="text-slate-400 text-[10px]">/ {stats.lines} 전체</span>
              </div>
              {[
                { id: "i", color: "#2db7a0", label: "I" },
                { id: "o", color: "#f0c93c", label: "O" },
                { id: "t", color: "#d936b0", label: "T" },
                { id: "s", color: "#a8e040", label: "S" },
                { id: "z", color: "#e23e3e", label: "Z" },
                { id: "j", color: "#5040c8", label: "J" },
                { id: "l", color: "#c74518", label: "L" },
              ].map(p => {
                const n = (stats.pieceCounts && stats.pieceCounts[p.id]) || 0;
                const locSum = (stats.pieceLocSums && stats.pieceLocSums[p.id]) || 0;
                return (
                  <div key={p.id} className="flex items-center gap-1.5">
                    <span className="inline-block w-3.5 h-3.5 rounded-sm shadow-sm" style={{ background: p.color }} />
                    <span className="font-mono text-slate-700 font-semibold">{p.label}</span>
                    <span className={cn("font-mono text-sm font-bold", n > 0 ? "text-slate-900" : "text-slate-300")}>{n}</span>
                    {n > 0 && (
                      <span className="font-mono text-[10px] text-slate-500">({locSum}L)</span>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <Button onClick={() => setIsPlaying(true)} className="h-8 px-3 text-xs">
                <RefreshCcw className="mr-1.5 h-3.5 w-3.5" />Play
              </Button>
              <Button variant="outline" className="h-8 px-3 text-xs" onClick={() => { setIsPlaying(false); setRefreshTick(v => v + 1); }}>Reset</Button>
              {advanced && (
                <Button variant="outline" className="h-8 px-3 text-xs" onClick={() => setIsPlaying(false)}>Pause</Button>
              )}
              <div className="ml-auto flex flex-wrap items-center gap-2 text-[11px] text-slate-500">
                {advanced ? `playfield: ${selected?.blocks?.[0]?._playfieldWidth || FILE_WIDTH} cells × ${stats.tallest + 1} high · ` : ""}drag to rotate
              </div>
            </div>
          </div>
        );
      }

      // ==========================================================
      // Legacy Tetris View (v0.1 — kept for reference, unused)
      // ==========================================================

      // ---- 테트로미노 상대 좌표 (x,y 셀 단위, origin 좌하) ----
      const TETROMINO = {
        I: [[0,0],[1,0],[2,0],[3,0]],
        O: [[0,0],[1,0],[0,1],[1,1]],
        T: [[0,0],[1,0],[2,0],[1,1]],
        L: [[0,0],[0,1],[0,2],[1,0]],
        J: [[1,0],[1,1],[1,2],[0,0]],
        S: [[0,0],[1,0],[1,1],[2,1]],
        Z: [[1,0],[2,0],[0,1],[1,1]],
      };

      // ---- Role → kind mapping ----
      const ROLE_TO_KIND = {
        import: "L", adapter: "L",
        function: "I", class: "I", route: "I",
        branch: "T",
        recovery: "S",
        loop: "Z",
        helper: "J", state: "J",
        return: "O",
        async_boundary: "I",
      };

      // ---- Assembly order ----
      const BUILD_ORDER = [
        "import", "adapter",           // 1
        "route", "function", "class",  // 2
        "branch",                      // 3
        "helper", "state",             // 4
        "loop",                        // 5
        "recovery",                    // 6
        "async_boundary",
        "return",                      // 7
      ];

      function roleOfLine(line) {
        const l = line.toLowerCase();
        if (!line.trim()) return null;
        if (/^\s*import\s|require\s*\(/.test(line)) return "import";
        if (/(adapter|service|client|connector)/i.test(line) && /=\s*\{|:\s*\{/.test(line)) return "adapter";
        if (/^\s*export\s+async\s+function\s+POST|export\s+async\s+function\s+(GET|PUT|DELETE)/i.test(line)) return "route";
        if (/response\.json\(|new\s+Response\(/.test(line)) return "route";
        if (/^\s*export\s+class|^\s*class\s+\w/.test(line)) return "class";
        if (/^\s*export\s+(async\s+)?function|^\s*async\s+function|^\s*function\s+\w/.test(line)) return "function";
        if (/async\s+\w+\s*\(|await\s+/.test(line)) return "async_boundary";
        if (/^\s*if\s*\(|^\s*\}\s*else/.test(line)) return "branch";
        if (/^\s*try\s*\{|^\s*\}\s*catch|finally\s*\{/.test(line)) return "recovery";
        if (/^\s*for\s*\(|^\s*while\s*\(|\.map\(|\.forEach\(|\.reduce\(|\.filter\(/.test(line)) return "loop";
        if (/^\s*return\s|^\s*throw\s+new/.test(line)) return "return";
        if (/const\s+\w+\s*=|let\s+\w+|var\s+\w+/.test(line)) return "state";
        return "helper";
      }

      // ---- fit score ----
      function computeFit(prevRoles, role, strategyVerdict, idx) {
        // orderMatch: 앞에 와야 할 role이 실제 앞에 있었는지
        const orderIdx = BUILD_ORDER.indexOf(role);
        const badOrder = prevRoles.some(p => BUILD_ORDER.indexOf(p) > orderIdx + 1);
        const orderMatch = badOrder ? 0.45 : 0.95;

        // dependencyMatch: import 후 function, function 후 branch 등
        const hasShell = prevRoles.includes("function") || prevRoles.includes("class") || prevRoles.includes("route");
        const needsShell = ["branch", "return", "loop", "state", "recovery"].includes(role);
        const dependencyMatch = needsShell && !hasShell ? 0.3 : 0.9;

        // signatureMatch: role이 null이 아니고 kind가 있으면 OK
        const signatureMatch = ROLE_TO_KIND[role] ? 0.95 : 0.4;

        // semanticMatch: strategy verdict 연관
        const semanticMatch =
          strategyVerdict === "go" ? 0.85 :
          strategyVerdict === "caution" ? 0.65 : 0.45;

        const finalFit =
          signatureMatch * 0.35 +
          dependencyMatch * 0.30 +
          orderMatch * 0.15 +
          semanticMatch * 0.20;
        return { signatureMatch, dependencyMatch, orderMatch, semanticMatch, finalFit };
      }

      function fitDecision(finalFit) {
        if (finalFit >= 0.80) return "lock";      // 정상
        if (finalFit >= 0.55) return "wobble";    // 흔들 후 체결
        if (finalFit >= 0.35) return "ghost";     // 임시 체결
        return "reject";
      }

      // ---- 코드 → BlockNode[] ----
      function buildBlocks(strategy) {
        const lines = strategy.codeAfter.split("\n");
        const roles = [];
        const blocks = [];
        lines.forEach((line, idx) => {
          const role = roleOfLine(line);
          if (!role) return;
          const kind = ROLE_TO_KIND[role];
          const statusBase =
            strategy.risk === "high" ? "critical" :
            strategy.risk === "medium" ? "watch" : "stable";
          const fit = computeFit(roles, role, strategy.verdict, idx);
          const dec = fitDecision(fit.finalFit);
          const status = dec === "reject" ? "rejected" : dec === "ghost" ? "ghost" : statusBase;
          blocks.push({
            id: `${strategy.id}-${idx}`,
            kind, role,
            label: role,
            sourceText: line,
            lineStart: idx + 1,
            lineEnd: idx + 1,
            strategyId: strategy.id,
            order: idx,
            confidence: strategy.confidence,
            impact: strategy.impact,
            status,
            fit, decision: dec,
          });
          roles.push(role);
        });
        // 구조 조립 순서로 재정렬 (리플레이용)
        return blocks.sort((a, b) => {
          const ia = BUILD_ORDER.indexOf(a.role);
          const ib = BUILD_ORDER.indexOf(b.role);
          if (ia !== ib) return ia - ib;
          return a.order - b.order;
        });
      }

      // ---- status colors ----
      const STATUS_COLOR = {
        stable:   { base: 0x60a5fa, emissive: 0x1e40af, edge: 0x93c5fd },
        watch:    { base: 0xfbbf24, emissive: 0xb45309, edge: 0xfcd34d },
        critical: { base: 0xf87171, emissive: 0x991b1b, edge: 0xfca5a5 },
        ghost:    { base: 0x94a3b8, emissive: 0x334155, edge: 0xcbd5e1 },
        rejected: { base: 0xef4444, emissive: 0x7f1d1d, edge: 0xfecaca },
      };
      const KIND_SHADES = {
        I: 0, T: 0.05, O: -0.05, L: 0.08, J: -0.08, S: 0.10, Z: -0.10,
      };

      // ---- Tetris Viewport 컴포넌트 ----
      function TetrisViewport({ strategies, selected, onPick, replayKey, replaying, replaySpeed, onHover }) {
        const hostRef = useRef(null);
        const stateRef = useRef({});

        // 빌드된 타워 3개 (deterministic)
        const towers = useMemo(() => strategies.map(s => ({
          strategyId: s.id, name: s.name, verdict: s.verdict,
          selected: s.id === selected.id,
          confidence: s.confidence, impact: s.impact, complexity: s.complexity,
          blocks: buildBlocks(s),
        })), [strategies, selected]);

        // init once
        useEffect(() => {
          const host = hostRef.current;
          if (!host) return;
          const w = host.clientWidth, h = host.clientHeight || 520;

          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0x0b1220);
          // fog 제거 — 멀리 줌아웃해도 흐려지지 않게

          const camera = new THREE.PerspectiveCamera(42, w / h, 0.1, 1000);
          camera.position.set(14, 16, 18);
          camera.lookAt(0, 6, 0);

          const renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setPixelRatio(window.devicePixelRatio);
          renderer.setSize(w, h);
          renderer.shadowMap.enabled = true;
          host.appendChild(renderer.domElement);

          scene.add(new THREE.AmbientLight(0xffffff, 0.45));
          const dir = new THREE.DirectionalLight(0xffffff, 0.9);
          dir.position.set(10, 20, 12);
          dir.castShadow = true;
          scene.add(dir);

          // floor
          const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.9, metalness: 0.0 })
          );
          floor.rotation.x = -Math.PI / 2;
          floor.position.y = -0.01;
          floor.receiveShadow = true;
          scene.add(floor);

          // grid
          const grid = new THREE.GridHelper(80, 40, 0x1e293b, 0x0f172a);
          grid.position.y = 0;
          scene.add(grid);

          let controls;
          if (window.THREE && THREE.OrbitControls) {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.target.set(0, 6, 0);
            controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.minDistance = 8;
            controls.maxDistance = 60;
          }

          const raycaster = new THREE.Raycaster();
          const pointer = new THREE.Vector2();
          let hovered = null;
          const onMove = (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const all = (stateRef.current.towerGroups || []).flatMap(g => g.children);
            const hits = raycaster.intersectObjects(all, true);
            const obj = hits.find(h => h.object.userData.blockId);
            if (obj) {
              const bd = obj.object.userData;
              if (!hovered || hovered.blockId !== bd.blockId) {
                hovered = bd;
                if (stateRef.current.onHover) stateRef.current.onHover(bd);
              }
            } else if (hovered) {
              hovered = null;
              if (stateRef.current.onHover) stateRef.current.onHover(null);
            }
          };
          renderer.domElement.addEventListener("pointermove", onMove);

          const onClick = (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const all = (stateRef.current.towerGroups || []).flatMap(g => g.children);
            const hits = raycaster.intersectObjects(all, true);
            const obj = hits.find(h => h.object.userData.strategyId);
            if (obj && stateRef.current.onPick) {
              stateRef.current.onPick(obj.object.userData.strategyId);
            }
          };
          renderer.domElement.addEventListener("click", onClick);

          let frameId;
          const clock = new THREE.Clock();
          const loop = () => {
            frameId = requestAnimationFrame(loop);
            const dt = clock.getDelta();
            if (controls) controls.update();
            // replay tick
            const rt = stateRef.current.replay;
            if (rt && rt.active) {
              rt.elapsed += dt * 1000 * (rt.speed || 1);
              const stepMs = 260;
              const wantStep = Math.floor(rt.elapsed / stepMs);
              if (wantStep > rt.step) {
                rt.step = wantStep;
                applyReplayStep(stateRef.current, rt.step);
              }
            }
            renderer.render(scene, camera);
          };
          loop();

          const onResize = () => {
            const nw = host.clientWidth, nh = host.clientHeight || 520;
            camera.aspect = nw / nh;
            camera.updateProjectionMatrix();
            renderer.setSize(nw, nh);
          };
          window.addEventListener("resize", onResize);

          stateRef.current = {
            scene, camera, renderer, controls,
            towerGroups: [],
            blockMap: new Map(),
            replay: null,
            onPick: null, onHover: null,
          };

          return () => {
            cancelAnimationFrame(frameId);
            window.removeEventListener("resize", onResize);
            renderer.domElement.removeEventListener("pointermove", onMove);
            renderer.domElement.removeEventListener("click", onClick);
            renderer.dispose();
            if (host.contains(renderer.domElement)) host.removeChild(renderer.domElement);
          };
        }, []);

        // towers sync — 블록 rebuild
        useEffect(() => {
          const s = stateRef.current;
          if (!s.scene) return;
          // remove old groups
          (s.towerGroups || []).forEach(g => {
            s.scene.remove(g);
            g.traverse(obj => {
              if (obj.geometry) obj.geometry.dispose();
              if (obj.material) obj.material.dispose();
            });
          });
          const groups = [];
          const blockMap = new Map();

          // 배치: 중앙 = selected, 좌/우 뒤 = ghost
          const selectedIdx = towers.findIndex(t => t.selected);
          const orderForLayout = [...towers];
          // 3개 슬롯 {center, left, right}
          const slotMap = new Map();
          if (selectedIdx >= 0) slotMap.set(towers[selectedIdx].strategyId, "center");
          let sidePick = 0;
          towers.forEach(t => {
            if (slotMap.has(t.strategyId)) return;
            slotMap.set(t.strategyId, sidePick === 0 ? "left" : "right");
            sidePick += 1;
          });

          towers.forEach(tower => {
            const slot = slotMap.get(tower.strategyId);
            const g = new THREE.Group();
            if (slot === "center") g.position.set(0, 0, 0);
            else if (slot === "left") g.position.set(-9, 0, -4);
            else g.position.set(9, 0, -4);
            g.userData = { strategyId: tower.strategyId, slot };

            tower.blocks.forEach((block, idx) => {
              const mesh = makeBlockMesh(block, idx, tower.selected);
              mesh.userData = {
                blockId: block.id,
                strategyId: tower.strategyId,
                role: block.role,
                kind: block.kind,
                status: block.status,
                decision: block.decision,
                confidence: block.confidence,
                impact: block.impact,
                sourceText: block.sourceText,
                lineStart: block.lineStart,
                fit: block.fit,
              };
              mesh.visible = true; // default complete form
              g.add(mesh);
              blockMap.set(block.id, mesh);
            });

            // ghost 타워: 반투명
            if (!tower.selected) {
              g.traverse(obj => {
                if (obj.material) {
                  obj.material.transparent = true;
                  obj.material.opacity = 0.28;
                }
              });
            }

            s.scene.add(g);
            groups.push(g);
          });
          s.towerGroups = groups;
          s.blockMap = blockMap;
          s.onPick = onPick;
          s.onHover = onHover;
        }, [towers, onPick, onHover]);

        // replay control
        useEffect(() => {
          const s = stateRef.current;
          if (!s.scene) return;
          s.replay = replaying
            ? { active: true, step: -1, elapsed: 0, speed: replaySpeed || 1 }
            : null;
          // replay 시작 시 전 블록 숨김
          if (replaying && s.towerGroups) {
            s.towerGroups.forEach(g => {
              g.children.forEach(m => {
                if (m.userData.strategyId === selected.id) {
                  m.visible = false;
                  m.userData._replayY = m.position.y;
                  m.position.y += 20;
                }
              });
            });
          } else if (s.towerGroups) {
            s.towerGroups.forEach(g => {
              const isMain = g.userData.strategyId === selected.id;
              g.children.forEach(m => {
                m.visible = true;
                if (m.userData._replayY !== undefined) {
                  m.position.y = m.userData._replayY;
                }
                m.traverse(obj => {
                  if (obj.material) {
                    obj.material.transparent = !isMain;
                    obj.material.opacity = isMain ? 1.0 : 0.28;
                  }
                });
              });
            });
          }
        }, [replaying, replayKey, replaySpeed, selected]);

        return (
          <div
            ref={hostRef}
            className="w-full rounded-3xl overflow-hidden border border-slate-800 shadow-2xl"
            style={{ height: 560, background: "radial-gradient(1200px 520px at 50% 0%, #1e293b 0%, #0b1220 65%)" }}
          />
        );
      }

      // ---- BlockMesh factory (7 tetromino) ----
      function makeBlockMesh(block, idx, isSelected) {
        const cells = TETROMINO[block.kind] || TETROMINO.J;
        const col = STATUS_COLOR[block.status] || STATUS_COLOR.stable;
        const kindShade = KIND_SHADES[block.kind] || 0;

        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({
          color: col.base,
          emissive: col.emissive,
          emissiveIntensity: isSelected ? 0.35 : 0.1,
          roughness: 0.45,
          metalness: 0.35,
          transparent: block.status === "ghost",
          opacity: block.status === "ghost" ? 0.5 : 1.0,
        });
        const edgeMat = new THREE.LineBasicMaterial({
          color: col.edge,
          transparent: true,
          opacity: block.status === "critical" ? 0.9 : 0.5,
        });

        const cell = 0.9;
        cells.forEach(([cx, cy]) => {
          const cube = new THREE.Mesh(new THREE.BoxGeometry(cell, cell, cell), mat);
          cube.position.set(cx * cell, cy * cell, 0);
          cube.castShadow = true;
          cube.receiveShadow = true;
          cube.userData = {
            blockId: block.id,
            strategyId: block.strategyId,
            role: block.role, kind: block.kind,
            status: block.status, decision: block.decision,
            confidence: block.confidence, impact: block.impact,
            sourceText: block.sourceText, lineStart: block.lineStart,
            fit: block.fit,
          };
          const edges = new THREE.EdgesGeometry(cube.geometry);
          const line = new THREE.LineSegments(edges, edgeMat);
          cube.add(line);
          group.add(cube);
        });

        // 블록 하나의 y 누적은 상위에서 결정. 여기서는 idx 기준 층 배치.
        group.position.y = idx * (cell + 0.05);
        // kind별 약간의 색 변이는 material에 반영됨 (shade는 lightness 변형으로 대체 가능하나 단순화)
        return group;
      }

      function applyReplayStep(state, step) {
        const groups = state.towerGroups || [];
        // 선택 타워 찾기
        const centerGroup = groups.find(g => g.userData.slot === "center");
        if (!centerGroup) return;
        const children = centerGroup.children;
        if (step < children.length) {
          const m = children[step];
          if (!m.visible) {
            m.visible = true;
            // 낙하 애니메이션: 목표 y로 부드럽게
            const targetY = m.userData._replayY;
            // simple tween via opacity + position
            const start = performance.now();
            const duration = 240;
            const startY = targetY + 20;
            const tick = () => {
              const t = Math.min(1, (performance.now() - start) / duration);
              const ease = 1 - (1 - t) * (1 - t);
              m.position.y = startY + (targetY - startY) * ease;
              if (t < 1) requestAnimationFrame(tick);
              else m.position.y = targetY;
            };
            tick();
          }
        }
      }

      // ---------- Three.js Viewport ----------
      const VERDICT_COLOR = { go: 0x10b981, caution: 0xf59e0b, review: 0xf43f5e };

      function makeStrategyMesh(strategy, index) {
        const group = new THREE.Group();
        group.position.x = (index - 1) * 3.8;
        group.userData = { strategyId: strategy.id };

        const scale = 1 + (strategy.impact || 0) / 80;
        const color = VERDICT_COLOR[strategy.verdict] ?? 0x64748b;
        let geo;
        if (strategy.id === "A") geo = new THREE.BoxGeometry(1, 1, 1);
        else if (strategy.id === "B") geo = new THREE.ConeGeometry(0.7, 1.4, 32);
        else geo = new THREE.SphereGeometry(0.75, 32, 32);
        const mat = new THREE.MeshStandardMaterial({
          color, roughness: 0.35, metalness: 0.25,
          emissive: color, emissiveIntensity: 0.0,
        });
        const center = new THREE.Mesh(geo, mat);
        center.scale.setScalar(scale);
        center.userData = { strategyId: strategy.id, isCenter: true };
        group.add(center);

        // ---- Cognitive Orbit: 8-axis (V1~V4 upper / V5~V8 lower) ----
