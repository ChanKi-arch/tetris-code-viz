        const radius = scale * 1.7;
        const slotMeshes = [];
        const addOrbit = (keys, color, emissive, yDir) => {
          keys.forEach((k, i) => {
            const t = (i + 0.5) / keys.length;       // 0..1
            const ang = Math.PI * t;                    // 0..π
            const x = Math.cos(ang) * radius;
            const y = yDir * (Math.sin(ang) * radius * 0.55 + 0.3);
            const s = new THREE.Mesh(
              new THREE.SphereGeometry(0.14, 14, 14),
              new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: 0.55, roughness: 0.3 })
            );
            s.position.set(x, y, 0);
            s.userData = { strategyId: strategy.id, slot: k };
            group.add(s);
            slotMeshes.push(s);
          });
        };
        addOrbit(["V1","V2","V3","V4"], 0x0ea5e9, 0x0369a1, +1);   // structural: upper
        addOrbit(["V5","V6","V7","V8"], 0x8b5cf6, 0x5b21b6, -1);   // contextual: lower

        // 얇은 디스크 (직관원판)
        const disc = new THREE.Mesh(
          new THREE.RingGeometry(radius * 0.98, radius * 1.02, 64),
          new THREE.MeshBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
        );
        disc.rotation.x = Math.PI / 2;
        group.add(disc);

        group.userData.centerMesh = center;
        group.userData.slotMeshes = slotMeshes;
        group.userData.disc = disc;
        return group;
      }

      function Viewport3D({ strategies, selected, lineage, onPick }) {
        const hostRef = useRef(null);
        const stateRef = useRef({});

        // init once
        useEffect(() => {
          const host = hostRef.current;
          if (!host) return;
          const w = host.clientWidth, h = host.clientHeight || 420;
          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0x0f172a);
          const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
          camera.position.set(0, 2.5, 8);
          const renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setPixelRatio(window.devicePixelRatio);
          renderer.setSize(w, h);
          host.appendChild(renderer.domElement);

          scene.add(new THREE.AmbientLight(0xffffff, 0.55));
          const dir = new THREE.DirectionalLight(0xffffff, 0.9);
          dir.position.set(5, 6, 4);
          scene.add(dir);

          const grid = new THREE.GridHelper(16, 16, 0x334155, 0x1e293b);
          grid.position.y = -1.2;
          scene.add(grid);

          let controls;
          if (window.THREE && THREE.OrbitControls) {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.6;
            controls.target.set(0, 0, 0);
          }

          const raycaster = new THREE.Raycaster();
          const pointer = new THREE.Vector2();
          const onClick = (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const hits = raycaster.intersectObjects(stateRef.current.meshes || [], true);
            if (!hits.length || !stateRef.current.onPick) return;
            const first = hits[0].object;
            const sid = first.userData.strategyId;
            if (sid) stateRef.current.onPick(sid);
          };
          renderer.domElement.addEventListener("click", onClick);

          let frameId;
          const loop = () => {
            frameId = requestAnimationFrame(loop);
            if (controls) controls.update();
            renderer.render(scene, camera);
          };
          loop();

          const onResize = () => {
            const nw = host.clientWidth, nh = host.clientHeight || 420;
            camera.aspect = nw / nh;
            camera.updateProjectionMatrix();
            renderer.setSize(nw, nh);
          };
          window.addEventListener("resize", onResize);

          stateRef.current = { scene, camera, renderer, controls, meshes: [], lineageGroup: new THREE.Group(), onPick: null };
          scene.add(stateRef.current.lineageGroup);

          return () => {
            cancelAnimationFrame(frameId);
            window.removeEventListener("resize", onResize);
            renderer.domElement.removeEventListener("click", onClick);
            renderer.dispose();
            host.removeChild(renderer.domElement);
          };
        }, []);

        // sync meshes (group 단위)
        useEffect(() => {
          const s = stateRef.current;
          if (!s.scene) return;
          // remove old
          (s.meshes || []).forEach(g => {
            s.scene.remove(g);
            g.traverse(obj => {
              if (obj.geometry) obj.geometry.dispose();
              if (obj.material) obj.material.dispose();
            });
          });
          const groups = strategies.map(makeStrategyMesh);
          groups.forEach(g => s.scene.add(g));
          s.meshes = groups;
        }, [strategies]);

        // lineage — 셀로판 Z-stacking
        useEffect(() => {
          const s = stateRef.current;
          if (!s.lineageGroup) return;
          // 기존 제거
          while (s.lineageGroup.children.length) {
            const c = s.lineageGroup.children.pop();
            if (c.geometry) c.geometry.dispose();
            if (c.material) c.material.dispose();
          }
          const arr = lineage || [];
          arr.forEach((entry, i) => {
            const age = arr.length - 1 - i;
            const z = -2.2 - age * 1.0;
            const baseOpacity = Math.max(0.08, 0.55 - age * 0.08);

            const plateGeo = new THREE.PlaneGeometry(10, 3.2);
            const plateMat = new THREE.MeshBasicMaterial({
              color: 0xcbd5e1, transparent: true, opacity: baseOpacity * 0.35,
              side: THREE.DoubleSide,
            });
            const plate = new THREE.Mesh(plateGeo, plateMat);
            plate.position.z = z;
            plate.position.y = 0;
            s.lineageGroup.add(plate);

            (entry.snapshot || []).forEach((snap, j) => {
              const color = VERDICT_COLOR[snap.verdict] ?? 0x64748b;
              const mGeo = new THREE.SphereGeometry(0.22 + (snap.impact || 0) / 300, 14, 14);
              const mMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: baseOpacity });
              const marker = new THREE.Mesh(mGeo, mMat);
              marker.position.set((j - 1) * 2.4, 0, z + 0.05);
              s.lineageGroup.add(marker);
            });
          });
        }, [lineage]);

        // highlight selected + expose onPick
        useEffect(() => {
          const s = stateRef.current;
          if (!s.meshes) return;
          s.meshes.forEach(group => {
            const center = group.userData.centerMesh;
            if (!center) return;
            const isSel = group.userData.strategyId === selected.id;
            center.material.emissiveIntensity = isSel ? 0.5 : 0.0;
            const impact = strategies.find(x => x.id === group.userData.strategyId)?.impact || 0;
            const baseScale = 1 + impact / 80;
            center.scale.setScalar(baseScale * (isSel ? 1.15 : 1));
            // orbit slot emissive intensity
            (group.userData.slotMeshes || []).forEach(slot => {
              slot.material.emissiveIntensity = isSel ? 0.8 : 0.35;
            });
            if (group.userData.disc) {
              group.userData.disc.material.opacity = isSel ? 0.55 : 0.2;
            }
          });
          s.onPick = onPick;
        }, [selected, onPick, strategies]);

        return (
          <div
            ref={hostRef}
            className="w-full rounded-3xl overflow-hidden border border-slate-800 shadow-2xl"
            style={{ height: 560, background: "radial-gradient(1200px 500px at 50% 0%, #1e293b 0%, #0f172a 60%)" }}
          />
        );
      }

            setGitDialogOpen(false);

          return inferStrategies(prompt, files, codeInput);

        const analyzerPayload = useMemo(() => buildAnalyzerPayload(prompt, files, codeInput, selected), [prompt, files, codeInput, selected]);

          if (!llmCfg.enabled) { setLlmContextual(null); setLlmStatus("idle"); setLlmError(null); return; }
          let cancelled = false;
          setLlmStatus("loading"); setLlmError(null);
          llmImagineContextual(llmCfg, prompt, codeInput)
            .then(fmep => { if (!cancelled) { setLlmContextual(fmep); setLlmStatus("ok"); } })
            .catch(e => { if (!cancelled) { setLlmStatus("error"); setLlmError(String(e.message || e)); } });
          return () => { cancelled = true; };
        }, [llmCfg.enabled, llmCfg.baseUrl, llmCfg.model, llmCfg.apiKey, prompt, codeInput]);

          if (!llmContextual) return slots;

            ...slots,
            F: llmContextual.V5 || slots.V5,
            M: llmContextual.V6 || slots.V6,
            E: llmContextual.V7 || slots.V7,
            P: llmContextual.V8 || slots.V8,

                                  <p className="mt-2 text-sm leading-6 text-slate-600">{strategy.summary}</p>
                                </div>
                                {selected.id === strategy.id ? <CheckCircle2 className="h-5 w-5 text-emerald-600" /> : <ArrowRight className="h-5 w-5 text-slate-400" />}
                              </div>
                              <div className="mt-4 grid gap-3 md:grid-cols-3">
                                <MetricBar label="Confidence" value={strategy.confidence} />
                                <MetricBar label="Impact" value={strategy.impact} />
                                <MetricBar label="Complexity" value={strategy.complexity} />
                              </div>
                            </button>
                          ))}
                        </div>
                      </CardContent>
                    </Card>

                    <Card className="lg:col-span-5 rounded-3xl border-0 shadow-sm">
                      <CardHeader><CardTitle className="flex items-center gap-2 text-lg"><Radar className="h-5 w-5" />Health Signals</CardTitle></CardHeader>
                      <CardContent className="space-y-4">
                        <div className="rounded-3xl bg-slate-950 p-5 text-white">
                          <div className="text-sm text-slate-300">Implementation health</div>
                          <div className="mt-2 text-4xl font-semibold">{healthScore}</div>
                        </div>
                        <div className="grid gap-3">
                          <div className="rounded-2xl bg-slate-50 p-3 text-sm text-slate-700"><Gauge className="mr-2 inline h-4 w-4" />Volume: {Math.round((selected.impact + selected.complexity) / 2)}</div>
                          <div className="rounded-2xl bg-slate-50 p-3 text-sm text-slate-700"><Shield className="mr-2 inline h-4 w-4" />Review demand: {selected.verdict}</div>
                          <div className="rounded-2xl bg-slate-50 p-3 text-sm text-slate-700"><FileWarning className="mr-2 inline h-4 w-4" />Touched files: {selected.files.length}</div>
                        </div>
                      </CardContent>
                    </Card>
                  </div>

                  {/* Advanced features available in Pro mode */}

                  {compareMode && (
                    <Card className="rounded-3xl border-0 shadow-sm">
                      <CardHeader><CardTitle className="flex items-center gap-2 text-lg"><GitBranch className="h-5 w-5" />Strategy Compare Mode</CardTitle></CardHeader>
                      <CardContent>
                        <div className="grid gap-4 lg:grid-cols-3">
                          {strategies.map(strategy => (
                            <div key={strategy.id} className="rounded-3xl border border-slate-200 p-4">
                              <div className="flex items-center justify-between gap-2">
                                <div className="text-base font-semibold text-slate-950">{strategy.id}. {strategy.name}</div>
                                <Badge className={verdictClass(strategy.verdict)}>{strategy.verdict}</Badge>
                              </div>
                              <p className="mt-2 text-sm leading-6 text-slate-600">{strategy.summary}</p>
                              <div className="mt-4 grid gap-3">
                                <MetricBar label="Confidence" value={strategy.confidence} />
                                <MetricBar label="Impact" value={strategy.impact} />
                                <MetricBar label="Complexity" value={strategy.complexity} />
                              </div>
                            </div>
                          ))}
                        </div>
                      </CardContent>
                    </Card>
                  )}

                  <div className="grid gap-6 lg:grid-cols-12">
                    <Card className={cn("rounded-3xl border-0 shadow-sm", advanced ? "lg:col-span-8" : "lg:col-span-12")}>
                      <CardHeader><CardTitle className="flex items-center gap-2 text-lg"><Clock3 className="h-5 w-5" />Generation Timeline / Trace</CardTitle></CardHeader>
                      <CardContent>
                        <div className="grid gap-4 md:grid-cols-3">
                          {selected.trace.map((item, idx) => (
                            <div key={item.stage} className={cn("fade-in rounded-3xl border p-4", toneClass(item.tone))} style={{ animationDelay: `${idx * 0.08}s` }}>
                              <div className="text-xs font-medium uppercase tracking-wide opacity-80">Stage {idx + 1}</div>
                              <div className="mt-2 font-semibold">{item.stage}</div>
                              <p className="mt-2 text-sm leading-6">{item.detail}</p>
                            </div>
                          ))}
                        </div>
                      </CardContent>
                    </Card>

                    {advanced && (
                    <Card className="lg:col-span-4 rounded-3xl border-0 shadow-sm">
                      <CardHeader><CardTitle className="flex items-center gap-2 text-lg"><Wand2 className="h-5 w-5" />Mock Analyzer Insights</CardTitle></CardHeader>
                      <CardContent className="space-y-3 text-sm text-slate-700">
                        <div className="rounded-2xl bg-slate-50 p-3"><SearchCheck className="mr-2 inline h-4 w-4" />Keyword set: {analyzerPayload.parserSignals.keywords.join(", ") || "generic"}</div>
                        <div className="rounded-2xl bg-slate-50 p-3">Async flow detected: {analyzerPayload.parserSignals.hasAsync ? "yes" : "no"}</div>
                        <div className="rounded-2xl bg-slate-50 p-3">Session check detected: {analyzerPayload.parserSignals.hasSessionCheck ? "yes" : "no"}</div>
                        <div className="rounded-2xl bg-slate-50 p-3">JSON response path detected: {analyzerPayload.parserSignals.hasResponseJson ? "yes" : "no"}</div>
                      </CardContent>
                    </Card>
                    )}
                  </div>
                </>
              )}

              {activePanel === "code" && (
                <>
                  <Card className="rounded-3xl border-0 shadow-sm">
                    <CardHeader><CardTitle className="flex items-center gap-2 text-lg"><FileCode2 className="h-5 w-5" />Code Workspace</CardTitle></CardHeader>
                    <CardContent className="space-y-6">
                      <div className="grid gap-4 md:grid-cols-2">
                        <div className="rounded-3xl border border-slate-200 p-4"><div className="mb-3 text-sm font-medium text-slate-800">Before</div><pre className="overflow-x-auto rounded-2xl bg-slate-950 p-4 text-xs leading-6 text-slate-100">{selected.codeBefore}</pre></div>
                        <div className="rounded-3xl border border-slate-200 p-4"><div className="mb-3 text-sm font-medium text-slate-800">After</div><pre className="overflow-x-auto rounded-2xl bg-slate-950 p-4 text-xs leading-6 text-slate-100">{selected.codeAfter}</pre></div>
                      </div>
                      <div className="rounded-3xl border border-slate-200 p-4">
                        <div className="mb-3 text-sm font-medium text-slate-800">Diff view</div>
                        <pre className="overflow-x-auto rounded-2xl bg-slate-950 p-4 text-xs leading-6">
                          {selected.diffLines.map((line, index) => (
                            <div key={`${line.type}-${index}`} className={diffLineClass(line.type)}>{line.content}</div>
                          ))}
                        </pre>
                      </div>
                    </CardContent>
                  </Card>

                  <Card className="rounded-3xl border-0 shadow-sm">
                    <CardHeader>
                      <CardTitle className="flex items-center gap-2 text-lg">
                        <ScanSearch className="h-5 w-5" />
                        Decompose — code → slots (reverse map)
                        <span className="ml-2 text-xs font-normal text-slate-500">Reverse-map generated code to 8-axis slots</span>
                      </CardTitle>
                    </CardHeader>
                    <CardContent>
                      <DecomposePanel codeAfter={selected.codeAfter} activeSlot={activeSlot} onSlotHover={setActiveSlot} />
                    </CardContent>
                  </Card>

                  <Card className="rounded-3xl border-0 shadow-sm">
                    <CardHeader><CardTitle className="flex items-center gap-2 text-lg"><Workflow className="h-5 w-5" />Explain Back — why this path wins</CardTitle></CardHeader>
                    <CardContent className="space-y-3">
                      {selected.decompose.map((step, idx) => (
                        <div key={step} className="fade-in rounded-2xl border border-slate-200 p-4" style={{ animationDelay: `${idx * 0.08}s` }}>
                          <div className="text-xs font-medium uppercase tracking-wide text-slate-500">Step {idx + 1}</div>
                          <div className="mt-2 text-sm leading-6 text-slate-800">{step}</div>
                        </div>
                      ))}
                      <div className="rounded-2xl border border-slate-200 p-4">
                        <div className="mb-3 text-sm font-medium text-slate-800">Impact map</div>
                        <div className="space-y-2">
                          {selected.impactMap.map(item => (
                            <div key={item.file} className="rounded-xl bg-slate-50 p-3">
                              <div className="flex items-center justify-between gap-2">
                                <div className="font-mono text-xs text-slate-900">{item.file}</div>
                                <Badge className={impactBadgeClass(item.level)}>{item.level}</Badge>
                              </div>
                              <div className="mt-2 text-sm text-slate-700">{item.note}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </CardContent>
                  </Card>
                </>
              )}
              </>
              )}

              {/* sLLM dialog + System tab (Dependency Flow + Analyzer Payload) = Pro mode */}

              {gitDialogOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4" onClick={() => setGitDialogOpen(false)}>
                  <div className="w-full max-w-2xl rounded-3xl bg-white p-6 shadow-2xl" onClick={(e) => e.stopPropagation()}>
                    <div className="flex items-center gap-2">
                      <GitBranch className="h-5 w-5 text-violet-600" />
                      <div className="text-lg font-semibold">Paste git diff</div>
                    </div>
                    <p className="mt-2 text-sm text-slate-600">
                      Paste output of <code className="rounded bg-slate-100 px-1">git diff</code> or <code className="rounded bg-slate-100 px-1">git diff --cached</code>.
                      TraceForge parses it, infers strategies, and generates tetris blocks automatically. 툴 독립적 — Cursor/Claude Code/Codex 결과 무엇이든.
                    </p>
                    <div className="mt-4 space-y-3">
                      <div>
                        <label className="text-xs font-medium text-slate-700">Git diff output</label>
                        <Textarea
                          value={gitDiffText}
                          onChange={(e) => setGitDiffText(e.target.value)}
                          className="min-h-[200px] rounded-2xl font-mono text-[11px] leading-5"
                          placeholder={"diff --git a/lib/auth.ts b/lib/auth.ts\nindex 1111..2222 100644\n--- a/lib/auth.ts\n+++ b/lib/auth.ts\n@@ -1,3 +1,5 @@\n-  return { ok: true };\n+  const s = await getSession();\n+  return { ok: !!s };"}
                        />
                      </div>
                      <div className="grid gap-3 md:grid-cols-3">
                        <div>
                          <label className="text-xs font-medium text-slate-700">Prompt (optional)</label>
                          <Input value={gitPromptText} onChange={e => setGitPromptText(e.target.value)} placeholder="what the AI was asked to do" />
                        </div>
                        <div>
                          <label className="text-xs font-medium text-slate-700">Repo name (optional)</label>
                          <Input value={gitRepoName} onChange={e => setGitRepoName(e.target.value)} placeholder="my-app" />
                        </div>
                        <div>
                          <label className="text-xs font-medium text-slate-700">Branch (optional)</label>
                          <Input value={gitBranch} onChange={e => setGitBranch(e.target.value)} placeholder="feature/login" />
                        </div>
                      </div>
                      {gitImportError && (
                        <div className="rounded-xl border border-rose-200 bg-rose-50 p-3 text-xs text-rose-700">
                          {gitImportError}
                        </div>
                      )}
                      <div className="flex flex-wrap gap-2 pt-2">
                        <Button onClick={importGitDiff}>
                          <ArrowRight className="mr-2 h-4 w-4" />Import &amp; Replay
                        </Button>
                        <Button variant="outline" onClick={() => { setGitDiffText(""); setGitImportError(null); }}>
                          Clear
                        </Button>
                        <Button variant="outline" onClick={() => setGitDialogOpen(false)}>Cancel</Button>
                        <div className="ml-auto text-[11px] text-slate-500 self-center">
                          Tip: <code>git diff HEAD~1</code> for last commit · <code>git diff --cached</code> for staged
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ===== Footer line — minimal credit ===== */}
              <div className="pt-6 pb-2 flex flex-wrap items-center justify-between gap-2 text-[11px] text-slate-500">
                <div>Tetris Code · single HTML, no build · paste any code, watch it stack</div>
                <div className="flex items-center gap-3">
                  <a href="https://github.com/" target="_blank" rel="noreferrer" className="hover:text-slate-900">GitHub</a>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<TraceForge />);
    </script>
  </body>
</html>
